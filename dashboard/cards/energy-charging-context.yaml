---
type: vertical-stack
cards:
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: battery.charging_state
          - name: Charging state
          - icon: mdi:ev-station
          - label: Current state
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: battery.charging_power
          - name: Charging power
          - icon: mdi:flash
          - label: Live power
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: battery.plug_connected
          - name: Plug connected
          - icon: mdi:power-plug
          - label: Cable state
  - type: custom:decluttering-card
    template: kia_visual_text_panel
    variables:
      - title: Charging Context
      - content: >-
          Charging context should complement the Battery page without
          duplicating its action controls.
