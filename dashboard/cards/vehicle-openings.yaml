---
type: vertical-stack
cards:
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: openings.front_left_door
          - name: Front left door
          - icon: mdi:car-door
          - label: Door state
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: openings.front_right_door
          - name: Front right door
          - icon: mdi:car-door
          - label: Door state
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: openings.rear_left_door
          - name: Rear left door
          - icon: mdi:car-door
          - label: Door state
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: openings.rear_right_door
          - name: Rear right door
          - icon: mdi:car-door
          - label: Door state
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: openings.trunk
          - name: Trunk
          - icon: mdi:car-back
          - label: Cargo opening
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: openings.hood
          - name: Hood
          - icon: mdi:car-cog
          - label: Service opening
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: openings.front_left_window
          - name: Front left window
          - icon: mdi:car-door
          - label: Window state
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: openings.front_right_window
          - name: Front right window
          - icon: mdi:car-door
          - label: Window state
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: openings.rear_left_window
          - name: Rear left window
          - icon: mdi:car-door
          - label: Window state
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: openings.rear_right_window
          - name: Rear right window
          - icon: mdi:car-door
          - label: Window state
