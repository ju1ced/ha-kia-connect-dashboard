---
view_layout:
  grid-area: status
type: custom:button-card
show_icon: false
show_name: false
show_state: false
tap_action:
  action: navigate
  navigation_path: /kia-ev6/dashboard-admin
custom_fields:
  content: |
    [[[ return '<div class="status-panel"><ha-icon class="shield" icon="mdi:shield-check-outline"></ha-icon><div><strong>All systems normal</strong><span>No active dashboard warnings. Review Vehicle and Settings after each Home Assistant update.</span></div><ha-icon class="watermark" icon="mdi:shield-check-outline"></ha-icon></div>'; ]]]
styles:
  card:
    - min-height: 182px
    - border-radius: 14px
    - padding: 0
    - background: var(--kia-card-background, rgba(21, 27, 36, 0.94))
    - border: var(--kia-card-border, 1px solid rgba(92, 200, 255, 0.16))
    - box-shadow: var(--kia-shadow-card, 0 16px 34px rgba(0, 0, 0, 0.24))
    - overflow: hidden
  grid:
    - "grid-template-areas: 'content'"
    - grid-template-columns: 1fr
    - grid-template-rows: 1fr
  custom_fields:
    content:
      - display: block
      - align-self: stretch
      - justify-self: stretch
      - width: 100%
      - height: 100%
      - min-width: 0
      - text-align: left
card_mod:
  style: |
    ha-card #container,
    ha-card #root,
    ha-card #content { width: 100% !important; height: 100% !important; min-width: 0 !important; text-align: left !important; }
    ha-card #content { display: block !important; }
    ha-card .status-panel { width: 100%; min-height: 182px; box-sizing: border-box; padding: 18px 20px; display: grid; grid-template-columns: 48px minmax(0, 1fr) 66px; align-items: center; gap: 16px; }
    ha-card .shield { color: var(--kia-status-charging, #7ee787); width: 40px; height: 40px; }
    ha-card .status-panel strong { color: var(--kia-text-primary, #f4f6f8); display: block; font-size: 18px; font-weight: 800; line-height: 1.15; }
    ha-card .status-panel span { color: var(--kia-text-secondary, #b7c0cc); display: block; font-size: 14px; line-height: 1.35; margin-top: 4px; }
    ha-card .watermark { color: var(--kia-text-secondary, #b7c0cc); width: 58px; height: 58px; opacity: 0.18; justify-self: end; }
    @media (max-width: 760px) { ha-card .status-panel { grid-template-columns: 42px minmax(0, 1fr); } ha-card .watermark { display: none; } }
