---
type: vertical-stack
cards:
  - type: custom:decluttering-card
    template: kia_visual_text_panel
    variables:
      - title: Entity Mapping
      - content: >-
          Entity IDs are configured in dashboard/templates/entities.yaml only.
          Keep logical keys stable and update mapped entity values there.
  - type: custom:decluttering-card
    template: kia_visual_text_panel
    variables:
      - title: Missing Entity Handling
      - content: >-
          When a dashboard row appears unavailable or unknown, check the mapped
          value in dashboard/templates/entities.yaml first. Card files should
          keep using logical keys so the package remains portable.
  - type: custom:decluttering-card
    template: kia_visual_text_panel
    variables:
      - title: Validation Coverage
      - content: >-
          QA rejects direct Home Assistant entity IDs outside the mapping file
          and rejects logical keys that are not present in the mapping contract.
