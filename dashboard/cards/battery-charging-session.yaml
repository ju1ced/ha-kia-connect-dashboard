---
type: vertical-stack
cards:
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: battery.charging_power
          - name: Charging power
          - icon: mdi:flash
          - label: Current power
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: battery.charging_state
          - name: Charging state
          - icon: mdi:battery-charging
          - label: Session state
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: battery.plug_connected
          - name: Plug connected
          - icon: mdi:power-plug
          - label: Cable state
  - type: custom:decluttering-card
    template: kia_visual_text_panel
    variables:
      - title: Charging Session
      - content: >-
          Charging history and estimated completion can be connected once the
          required mapped entities are available.
