---
view_layout:
  grid-area: tires
type: custom:button-card
entity: tires.front_left_pressure
triggers_update:
  - tires.front_left_pressure
  - tires.front_right_pressure
  - tires.rear_left_pressure
  - tires.rear_right_pressure
variables:
  front_left_entity: tires.front_left_pressure
  front_right_entity: tires.front_right_pressure
  rear_left_entity: tires.rear_left_pressure
  rear_right_entity: tires.rear_right_pressure
show_icon: false
show_name: false
show_state: false
tap_action:
  action: more-info
  entity: tires.front_left_pressure
custom_fields:
  content: |
    [[[
      function value(id) {
        var e = states[id] || null;
        if (!e || !e.state || e.state === 'unknown' || e.state === 'unavailable') return 'OK';
        var unit = e.attributes && e.attributes.unit_of_measurement ? ' ' + e.attributes.unit_of_measurement : '';
        return e.state + unit;
      }
      var image = '/local/vehicles/' + 'ev6_top.png';
      var shell = 'height:100%;min-height:182px;box-sizing:border-box;padding:16px 18px;display:grid;grid-template-rows:30px 1fr;gap:8px;';
      var title = 'display:flex;align-items:center;gap:10px;color:var(--kia-text-primary,#f4f6f8);font-size:17px;font-weight:800;';
      var diagram = 'display:grid;grid-template-columns:minmax(120px,1fr) 96px minmax(120px,1fr);grid-template-rows:1fr 1fr;gap:8px 18px;align-items:center;width:100%;height:100%;min-height:118px;min-width:0;';
      function tire(cls, side, id, label) {
        var align = side === 'left' ? 'text-align:right;' : 'text-align:left;';
        var dot = side === 'left' ? '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--kia-status-charging,#7ee787);box-shadow:0 0 0 3px rgba(126,231,135,.14);margin-left:7px;vertical-align:1px;"></span>' : '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--kia-status-charging,#7ee787);box-shadow:0 0 0 3px rgba(126,231,135,.14);margin-right:7px;vertical-align:1px;"></span>';
        return '<div style="' + align + 'min-width:0;color:var(--kia-text-primary,#f4f6f8);">' + (side === 'right' ? dot : '') + '<strong style="font-size:16px;font-weight:800;line-height:1.05;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + value(id) + '</strong>' + (side === 'left' ? dot : '') + '<span style="display:block;color:var(--kia-text-secondary,#b7c0cc);font-size:12px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + label + '</span></div>';
      }
      return '<div style="' + shell + '">'
        + '<div style="' + title + '"><ha-icon icon="mdi:tire" style="width:20px;color:var(--kia-text-secondary,#b7c0cc)"></ha-icon><span>Tire Status</span><ha-icon icon="mdi:chevron-right" style="margin-left:auto;width:20px;color:var(--kia-text-secondary,#b7c0cc)"></ha-icon></div>'
        + '<div style="' + diagram + '">'
        + tire('fl', 'left', variables.front_left_entity, 'Front left')
        + tire('fr', 'right', variables.front_right_entity, 'Front right')
        + '<img src="' + image + '" alt="EV6 top view" style="grid-column:2;grid-row:1 / span 2;width:88px;height:128px;object-fit:contain;justify-self:center;filter:drop-shadow(0 10px 14px rgba(0,0,0,.44));">'
        + tire('rl', 'left', variables.rear_left_entity, 'Rear left')
        + tire('rr', 'right', variables.rear_right_entity, 'Rear right')
        + '</div></div>';
    ]]]
styles:
  card:
    - min-height: 182px
    - border-radius: 14px
    - padding: 0
    - background: var(--kia-card-background, rgba(21, 27, 36, 0.94))
    - border: var(--kia-card-border, 1px solid rgba(92, 200, 255, 0.16))
    - box-shadow: var(--kia-shadow-card, 0 16px 34px rgba(0, 0, 0, 0.24))
  grid:
    - "grid-template-areas: 'content'"
    - grid-template-columns: 1fr
    - grid-template-rows: 1fr
  custom_fields:
    content:
      - display: block
      - align-self: stretch
      - justify-self: stretch
      - width: 100%
      - height: 100%
      - min-width: 0
      - text-align: left
card_mod:
  style: |
    ha-card #container,
    ha-card #root,
    ha-card #content {
      width: 100% !important;
      height: 100% !important;
      min-width: 0 !important;
      text-align: left !important;
      align-items: stretch !important;
      justify-items: stretch !important;
    }
    ha-card #content { display: block !important; }
