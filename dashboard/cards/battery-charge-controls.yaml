---
type: grid
columns: 3
square: false
cards:
  - type: custom:decluttering-card
    template: kia_visual_action_tile
    variables:
      - entity: controls.start_charging
      - name: Start Charging
      - icon: mdi:ev-station
      - color: var(--kia-status-charging)
      - action: none
  - type: custom:decluttering-card
    template: kia_visual_action_tile
    variables:
      - entity: controls.stop_charging
      - name: Stop Charging
      - icon: mdi:stop-circle
      - color: var(--kia-status-warning)
      - action: none
  - type: custom:decluttering-card
    template: kia_visual_action_tile
    variables:
      - entity: controls.refresh
      - name: Refresh Data
      - icon: mdi:refresh
      - color: var(--kia-brand-primary)
      - action: none
