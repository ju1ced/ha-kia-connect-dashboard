---
type: grid
columns: 3
square: false
cards:
  - type: custom:decluttering-card
    template: kia_mapped_action_button
    variables:
      - entity: controls.start_charging
      - name: Start charging
      - icon: mdi:ev-station
      - action: none
  - type: custom:decluttering-card
    template: kia_mapped_action_button
    variables:
      - entity: controls.stop_charging
      - name: Stop charging
      - icon: mdi:stop-circle
      - action: none
  - type: custom:decluttering-card
    template: kia_mapped_action_button
    variables:
      - entity: controls.refresh
      - name: Refresh
      - icon: mdi:refresh
      - action: none
