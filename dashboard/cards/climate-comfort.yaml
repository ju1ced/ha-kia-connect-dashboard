---
type: vertical-stack
cards:
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: climate.hvac
          - name: HVAC state
          - icon: mdi:air-conditioner
          - label: Climate command
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: climate.defrost
          - name: Defrost
          - icon: mdi:car-defrost-front
          - label: Front screen
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: climate.steering_wheel_heater
          - name: Steering wheel heater
          - icon: mdi:steering
          - label: Comfort state
  - type: custom:decluttering-card
    template: kia_visual_text_panel
    variables:
      - title: Comfort
      - content: >-
          Comfort toggles should remain grouped here so remote cabin controls
          are easy to review before activation.
