---
type: vertical-stack
cards:
  - type: custom:decluttering-card
    template: kia_mapped_state_row
    variables:
      - entity: climate / cabin_temperature
      - name: Cabin temperature
      - icon: mdi:thermometer
  - type: custom:decluttering-card
    template: kia_mapped_state_row
    variables:
      - entity: climate / outside_temperature
      - name: Outside temperature
      - icon: mdi:thermometer-lines
  - type: custom:decluttering-card
    template: kia_mapped_section_note
    variables:
      - title: Temperature
      - content: >-
          This card owns temperature readouts and future target-temperature
          display.
