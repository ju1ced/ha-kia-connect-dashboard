---
type: vertical-stack
cards:
  - type: custom:decluttering-card
    template: kia_mapped_state_row
    variables:
      - entity: climate / set_temperature
      - name: Set temperature
      - icon: mdi:thermometer
  - type: custom:decluttering-card
    template: kia_mapped_section_note
    variables:
      - title: Temperature
      - content: >-
          The current Kia integration exposes the configured climate temperature.
          Cabin and outside temperature rows can be added when matching entities
          are available.
