---
view_layout:
  grid-area: location
type: custom:button-card
entity: location.tracker
triggers_update:
  - location.tracker
  - location.odometer
variables:
  tracker_entity: location.tracker
  odometer_entity: location.odometer
show_icon: false
show_name: false
show_state: false
tap_action:
  action: more-info
  entity: location.tracker
custom_fields:
  content: |
    [[[
      function value(id, fallback) {
        var e = states[id] || null;
        if (!e || !e.state || e.state === 'unknown' || e.state === 'unavailable') return fallback;
        var unit = e.attributes && e.attributes.unit_of_measurement ? ' ' + e.attributes.unit_of_measurement : '';
        return e.state + unit;
      }
      var shell = 'height:100%;min-height:182px;box-sizing:border-box;padding:16px 18px;display:grid;grid-template-rows:30px 1fr;gap:12px;';
      var title = 'display:flex;align-items:center;gap:10px;color:var(--kia-text-primary,#f4f6f8);font-size:17px;font-weight:800;';
      var body = 'display:grid;grid-template-columns:minmax(220px,1.3fr) minmax(150px,.7fr);gap:18px;align-items:stretch;width:100%;height:100%;min-width:0;';
      var map = 'min-height:104px;border-radius:10px;position:relative;overflow:hidden;border:1px solid rgba(92,200,255,.12);background:radial-gradient(circle at 50% 55%,rgba(92,200,255,.32),transparent 0 9px,rgba(92,200,255,.14) 10px 21px,transparent 22px),linear-gradient(32deg,transparent 0 28%,rgba(126,231,135,.18) 29% 31%,transparent 32% 100%),linear-gradient(145deg,rgba(33,48,55,.95),rgba(22,30,38,.95));';
      var details = 'display:grid;align-content:center;gap:14px;min-width:0;';
      function detail(label, text) {
        return '<div style="min-width:0"><span style="display:block;color:var(--kia-text-secondary,#b7c0cc);font-size:13px;">' + label + '</span><strong style="display:block;color:var(--kia-text-primary,#f4f6f8);font-size:18px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + text + '</strong></div>';
      }
      return '<div style="' + shell + '">'
        + '<div style="' + title + '"><ha-icon icon="mdi:map-marker" style="width:20px;color:var(--kia-text-secondary,#b7c0cc)"></ha-icon><span>Location</span><ha-icon icon="mdi:chevron-right" style="margin-left:auto;width:20px;color:var(--kia-text-secondary,#b7c0cc)"></ha-icon></div>'
        + '<div style="' + body + '">'
        + '<div style="' + map + '"><div style="position:absolute;inset:0;background-image:linear-gradient(90deg,rgba(183,192,204,.08) 1px,transparent 1px),linear-gradient(rgba(183,192,204,.08) 1px,transparent 1px);background-size:42px 42px;transform:rotate(-12deg) scale(1.25);"></div><div style="position:absolute;left:50%;top:50%;width:16px;height:16px;margin:-8px 0 0 -8px;border-radius:50%;background:var(--kia-brand-primary,#5cc8ff);box-shadow:0 0 0 8px rgba(92,200,255,.18),0 0 22px rgba(92,200,255,.42);"></div></div>'
        + '<div style="' + details + '">'
        + detail('Last parked', value(variables.tracker_entity, '--'))
        + detail('Odometer', value(variables.odometer_entity, '--'))
        + '</div></div></div>';
    ]]]
styles:
  card:
    - min-height: 182px
    - border-radius: 14px
    - padding: 0
    - background: var(--kia-card-background, rgba(21, 27, 36, 0.94))
    - border: var(--kia-card-border, 1px solid rgba(92, 200, 255, 0.16))
    - box-shadow: var(--kia-shadow-card, 0 16px 34px rgba(0, 0, 0, 0.24))
  grid:
    - "grid-template-areas: 'content'"
    - grid-template-columns: 1fr
    - grid-template-rows: 1fr
  custom_fields:
    content:
      - display: block
      - align-self: stretch
      - justify-self: stretch
      - width: 100%
      - height: 100%
      - min-width: 0
      - text-align: left
card_mod:
  style: |
    ha-card #container,
    ha-card #root,
    ha-card #content {
      width: 100% !important;
      height: 100% !important;
      min-width: 0 !important;
      text-align: left !important;
      align-items: stretch !important;
      justify-items: stretch !important;
    }
    ha-card #content { display: block !important; }
