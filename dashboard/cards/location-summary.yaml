---
view_layout:
  grid-area: location
type: custom:button-card
entity: location.tracker
triggers_update:
  - location.tracker
  - location.odometer
variables:
  tracker_entity: location.tracker
  odometer_entity: location.odometer
show_icon: false
show_name: false
show_state: false
tap_action:
  action: more-info
  entity: location.tracker
custom_fields:
  content: |
    [[[
      function value(id, fallback) {
        var e = states[id] || null;
        if (!e || !e.state || e.state === 'unknown' || e.state === 'unavailable') return fallback;
        var unit = e.attributes && e.attributes.unit_of_measurement ? ' ' + e.attributes.unit_of_measurement : '';
        return e.state + unit;
      }
      return '<div class="panel-shell location-panel"><div class="panel-title"><ha-icon icon="mdi:map-marker"></ha-icon><span>Location</span><ha-icon class="chevron" icon="mdi:chevron-right"></ha-icon></div><div class="location-body"><div class="map-preview"><div class="marker"></div></div><div class="location-details"><div><span>Last parked</span><strong>' + value(variables.tracker_entity, '--') + '</strong></div><div><span>Odometer</span><strong>' + value(variables.odometer_entity, '--') + '</strong></div></div></div></div>';
    ]]]
styles:
  card:
    - min-height: 182px
    - border-radius: 14px
    - padding: 0
    - background: var(--kia-card-background, rgba(21, 27, 36, 0.94))
    - border: var(--kia-card-border, 1px solid rgba(92, 200, 255, 0.16))
    - box-shadow: var(--kia-shadow-card, 0 16px 34px rgba(0, 0, 0, 0.24))
  grid:
    - "grid-template-areas: 'content'"
    - grid-template-columns: 1fr
    - grid-template-rows: 1fr
  custom_fields:
    content:
      - display: block
      - align-self: stretch
      - justify-self: stretch
      - width: 100%
      - height: 100%
      - min-width: 0
      - text-align: left
card_mod:
  style: |
    ha-card #container,
    ha-card #root,
    ha-card #content { width: 100% !important; height: 100% !important; min-width: 0 !important; text-align: left !important; }
    ha-card #content { display: block !important; }
    ha-card .panel-shell { width: 100%; min-height: 182px; box-sizing: border-box; padding: 16px 18px; }
    ha-card .panel-title { display: flex; align-items: center; gap: 10px; color: var(--kia-text-primary, #f4f6f8); font-size: 17px; font-weight: 800; margin-bottom: 12px; }
    ha-card .panel-title ha-icon { color: var(--kia-text-secondary, #b7c0cc); width: 20px; }
    ha-card .panel-title .chevron { margin-left: auto; }
    ha-card .location-body { display: grid; grid-template-columns: minmax(160px, 1.35fr) minmax(110px, 0.9fr); gap: 16px; align-items: stretch; }
    ha-card .map-preview { min-height: 104px; border-radius: 10px; position: relative; overflow: hidden; background: radial-gradient(circle at 50% 55%, rgba(92, 200, 255, 0.32), transparent 0 9px, rgba(92, 200, 255, 0.14) 10px 21px, transparent 22px), linear-gradient(32deg, transparent 0 28%, rgba(126, 231, 135, 0.18) 29% 31%, transparent 32% 100%), linear-gradient(145deg, rgba(33, 48, 55, 0.95), rgba(22, 30, 38, 0.95)); border: 1px solid rgba(92, 200, 255, 0.12); }
    ha-card .map-preview::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(90deg, rgba(183,192,204,0.08) 1px, transparent 1px), linear-gradient(rgba(183,192,204,0.08) 1px, transparent 1px); background-size: 42px 42px; transform: rotate(-12deg) scale(1.25); }
    ha-card .marker { position: absolute; left: 50%; top: 50%; width: 16px; height: 16px; margin: -8px 0 0 -8px; border-radius: 50%; background: var(--kia-brand-primary, #5cc8ff); box-shadow: 0 0 0 8px rgba(92, 200, 255, 0.18), 0 0 22px rgba(92, 200, 255, 0.42); z-index: 1; }
    ha-card .location-details { display: grid; align-content: center; gap: 14px; min-width: 0; }
    ha-card .location-details span { color: var(--kia-text-secondary, #b7c0cc); display: block; font-size: 13px; }
    ha-card .location-details strong { color: var(--kia-text-primary, #f4f6f8); display: block; font-size: 18px; font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    @media (max-width: 760px) { ha-card .location-body { grid-template-columns: 1fr; } }
