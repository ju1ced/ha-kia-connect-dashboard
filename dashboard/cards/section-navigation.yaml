---
view_layout:
  grid-area: nav
type: grid
columns: 3
square: false
cards:
  - type: custom:decluttering-card
    template: kia_visual_nav_tile
    variables:
      - name: Battery
      - icon: mdi:battery-charging-high
      - path: /lovelace/kia-battery
  - type: custom:decluttering-card
    template: kia_visual_nav_tile
    variables:
      - name: Vehicle
      - icon: mdi:car-info
      - path: /lovelace/kia-vehicle
  - type: custom:decluttering-card
    template: kia_visual_nav_tile
    variables:
      - name: Climate
      - icon: mdi:air-conditioner
      - path: /lovelace/kia-climate
  - type: custom:decluttering-card
    template: kia_visual_nav_tile
    variables:
      - name: Energy
      - icon: mdi:chart-line
      - path: /lovelace/kia-energy
  - type: custom:decluttering-card
    template: kia_visual_nav_tile
    variables:
      - name: Location
      - icon: mdi:map-marker
      - path: /lovelace/kia-location
  - type: custom:decluttering-card
    template: kia_visual_nav_tile
    variables:
      - name: Settings
      - icon: mdi:tune
      - path: /lovelace/kia-settings
