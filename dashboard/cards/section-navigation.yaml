---
view_layout:
  grid-area: nav
type: grid
columns: 6
square: false
cards:
  - type: custom:button-card
    name: Battery
    icon: mdi:battery-charging-high
    tap_action:
      action: navigate
      navigation_path: /lovelace/kia-battery
    template: kia_visual_nav_tile
  - type: custom:button-card
    name: Vehicle
    icon: mdi:car-info
    tap_action:
      action: navigate
      navigation_path: /lovelace/kia-vehicle
    template: kia_visual_nav_tile
  - type: custom:button-card
    name: Climate
    icon: mdi:air-conditioner
    tap_action:
      action: navigate
      navigation_path: /lovelace/kia-climate
    template: kia_visual_nav_tile
  - type: custom:button-card
    name: Energy
    icon: mdi:chart-line
    tap_action:
      action: navigate
      navigation_path: /lovelace/kia-energy
    template: kia_visual_nav_tile
  - type: custom:button-card
    name: Location
    icon: mdi:map-marker
    tap_action:
      action: navigate
      navigation_path: /lovelace/kia-location
    template: kia_visual_nav_tile
  - type: custom:button-card
    name: Settings
    icon: mdi:tune
    tap_action:
      action: navigate
      navigation_path: /lovelace/kia-settings
    template: kia_visual_nav_tile
