---
type: vertical-stack
cards:
  - type: custom:decluttering-card
    template: kia_visual_stat_tile
    variables:
      - entity: location.tracker
      - name: Tracker
      - icon: mdi:map-marker
      - label: Last known area
  - type: custom:decluttering-card
    template: kia_visual_text_panel
    variables:
      - title: Map Context
      - content: >-
          A native map card can replace this placeholder once the mapped tracker
          binding pattern is available.
