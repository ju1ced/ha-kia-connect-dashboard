---
type: grid
columns: 2
square: false
cards:
  - type: custom:decluttering-card
    template: kia_visual_perform_action_tile
    variables:
      - entity: controls.refresh
      - name: Refresh Vehicle
      - icon: mdi:refresh
      - color: var(--kia-brand-primary)
      - perform_action: button.press
  - type: custom:decluttering-card
    template: kia_visual_action_tile
    variables:
      - entity: settings.mapping
      - name: Vehicle Data Details
      - icon: mdi:file-cog
      - color: var(--kia-brand-primary)
      - action: more-info
