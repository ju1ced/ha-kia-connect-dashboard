---
type: vertical-stack
cards:
  - type: custom:decluttering-card
    template: kia_mapped_state_row
    variables:
      - entity: battery.target_charge_limit
      - name: Charge limit
      - icon: mdi:battery-sync
  - type: custom:decluttering-card
    template: kia_mapped_state_row
    variables:
      - entity: battery.plug_connected
      - name: Plug connected
      - icon: mdi:power-plug
  - type: custom:decluttering-card
    template: kia_mapped_state_row
    variables:
      - entity: battery.charging_state
      - name: Charging state
      - icon: mdi:battery-charging
  - type: custom:decluttering-card
    template: kia_mapped_section_note
    variables:
      - title: Battery Health
      - content: >-
          Battery health metrics can be added when the mapped integration
          exposes them.
