---
type: vertical-stack
cards:
  - type: custom:decluttering-card
    template: kia_visual_stat_tile
    variables:
      - entity: location.odometer
      - name: Odometer
      - icon: mdi:counter
      - label: Vehicle mileage
  - type: custom:decluttering-card
    template: kia_visual_text_panel
    variables:
      - title: Odometer
      - content: >-
          Odometer context belongs here so Energy can focus on efficiency and
          Overview can stay concise.
