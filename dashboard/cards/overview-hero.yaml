---
view_layout:
  grid-area: hero
type: custom:button-card
entity: battery.charging_state
triggers_update:
  - battery.charging_state
  - climate/hvac
  - battery.level
  - location.odometer
  - controls.last_refresh_result
variables:
  charging_entity: battery.charging_state
  climate_entity: climate/hvac
  battery_entity: battery.level
  odometer_entity: location.odometer
  updated_entity: controls.last_refresh_result
show_icon: false
show_name: false
show_state: false
tap_action:
  action: more-info
  entity: location.tracker
custom_fields:
  content: |
    [[[
      function value(id, fallback) {
        var e = states[id] || null;
        if (!e || !e.state || e.state === 'unknown' || e.state === 'unavailable') return fallback;
        var unit = e.attributes && e.attributes.unit_of_measurement ? ' ' + e.attributes.unit_of_measurement : '';
        return e.state + unit;
      }
      var battery = value(variables.battery_entity, '--');
      var chargingEntity = states[variables.charging_entity] || null;
      var chargingState = chargingEntity && chargingEntity.state ? String(chargingEntity.state).toLowerCase() : '';
      var charging = chargingState === 'on' || chargingState === 'charging';
      var climateEntity = states[variables.climate_entity] || null;
      var climateState = climateEntity && climateEntity.state ? String(climateEntity.state).toLowerCase() : 'unknown';
      var climateInactive = ['off', 'unknown', 'unavailable', 'none', ''].indexOf(climateState) !== -1;
      var climate = climateInactive ? 'Off' : climateState;
      var imageName = charging ? 'ev6_charging.png' : (!climateInactive ? 'ev6_climate.png' : 'ev6_' + 'front_right.png');
      var image = '/local/vehicles/' + imageName;
      return '<div class="hero-shell">'
        + '<div class="hero-top">'
        + '<div class="hero-title"><ha-icon icon="mdi:car-electric"></ha-icon><div><strong>Kia EV6</strong><span>GT-Line RWD</span></div></div>'
        + '<div class="hero-chips">'
        + '<span class="chip lock"><ha-icon icon="mdi:lock"></ha-icon>Locked</span>'
        + '<span class="chip online"><ha-icon icon="mdi:wifi"></ha-icon>Online</span>'
        + '<span class="chip battery"><ha-icon icon="mdi:battery-high"></ha-icon><b>' + battery + '</b><small>Battery</small></span>'
        + '</div></div>'
        + '<div class="hero-body">'
        + '<div class="hero-car"><img src="' + image + '" alt="Kia EV6" loading="eager"></div>'
        + '<div class="hero-metrics">'
        + '<div><ha-icon icon="mdi:speedometer"></ha-icon><span>Odometer</span><strong>' + value(variables.odometer_entity, '--') + '</strong></div>'
        + '<div><ha-icon icon="mdi:ev-plug-type2"></ha-icon><span>Charging state</span><strong class="ok">' + (charging ? 'Charging' : 'Not charging') + '</strong></div>'
        + '<div><ha-icon icon="mdi:calendar-clock"></ha-icon><span>Last updated</span><strong>' + value(variables.updated_entity, '--') + '</strong></div>'
        + '<div><ha-icon icon="mdi:thermometer"></ha-icon><span>Climate</span><strong>' + climate + '</strong></div>'
        + '</div></div></div>';
    ]]]
styles:
  card:
    - min-height: 314px
    - border-radius: 18px
    - padding: 0
    - overflow: hidden
    - background: var(--kia-hero-gradient, linear-gradient(145deg, rgba(17, 21, 28, 0.98), rgba(32, 36, 45, 0.94)))
    - border: var(--kia-card-border, 1px solid rgba(92, 200, 255, 0.18))
    - box-shadow: var(--kia-shadow-raised, 0 22px 54px rgba(0, 0, 0, 0.36))
  grid:
    - "grid-template-areas: 'content'"
    - grid-template-columns: 1fr
    - grid-template-rows: 1fr
  custom_fields:
    content:
      - display: block
      - align-self: stretch
      - justify-self: stretch
      - width: 100%
      - height: 100%
      - min-width: 0
      - min-height: 0
      - text-align: left
card_mod:
  style: |
    ha-card #container,
    ha-card #root,
    ha-card #content {
      width: 100% !important;
      height: 100% !important;
      min-width: 0 !important;
      text-align: left !important;
    }
    ha-card #content {
      display: block !important;
      min-height: 314px;
    }
    ha-card .hero-shell {
      width: 100%;
      height: 100%;
      min-height: 314px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 20px 24px 18px;
      box-sizing: border-box;
    }
    ha-card .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      min-width: 0;
    }
    ha-card .hero-title {
      display: flex;
      align-items: center;
      gap: 14px;
      color: var(--kia-text-primary, #f4f6f8);
      min-width: 220px;
    }
    ha-card .hero-title ha-icon {
      color: var(--kia-text-primary, #f4f6f8);
      width: 48px;
      height: 48px;
      flex: 0 0 auto;
    }
    ha-card .hero-title strong {
      display: block;
      font-size: clamp(32px, 2.5vw, 44px);
      font-weight: 800;
      line-height: 1.03;
    }
    ha-card .hero-title span {
      color: var(--kia-text-secondary, #b7c0cc);
      display: block;
      font-size: 16px;
      line-height: 1.2;
      margin-top: 3px;
    }
    ha-card .hero-chips {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }
    ha-card .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 14px;
      color: var(--kia-text-primary, #f4f6f8);
      background: rgba(92, 200, 255, 0.1);
      font-weight: 800;
      white-space: nowrap;
    }
    ha-card .chip ha-icon { width: 18px; height: 18px; }
    ha-card .chip.online { color: var(--kia-status-charging, #7ee787); background: rgba(126, 231, 135, 0.12); }
    ha-card .chip.lock { color: var(--kia-brand-primary, #5cc8ff); }
    ha-card .chip.battery { background: rgba(92, 200, 255, 0.12); }
    ha-card .chip.battery small {
      display: block;
      color: var(--kia-text-secondary, #b7c0cc);
      font-size: 11px;
      font-weight: 700;
      margin-left: -2px;
    }
    ha-card .hero-body {
      display: grid;
      grid-template-columns: minmax(640px, 1.55fr) minmax(360px, 0.68fr);
      gap: 30px;
      align-items: center;
      flex: 1 1 auto;
      min-height: 226px;
    }
    ha-card .hero-car {
      height: 250px;
      min-width: 0;
      align-self: end;
      overflow: visible;
    }
    ha-card .hero-car img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: left bottom;
      transform: scale(1.14);
      transform-origin: left bottom;
      filter: drop-shadow(0 22px 30px rgba(0, 0, 0, 0.5));
    }
    ha-card .hero-metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px 28px;
      border-left: 1px solid rgba(183, 192, 204, 0.16);
      padding-left: 30px;
    }
    ha-card .hero-metrics div {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      grid-template-areas: 'icon label' 'icon value';
      align-items: center;
      min-width: 0;
    }
    ha-card .hero-metrics ha-icon {
      grid-area: icon;
      width: 24px;
      color: var(--kia-text-secondary, #b7c0cc);
    }
    ha-card .hero-metrics span {
      grid-area: label;
      color: var(--kia-text-secondary, #b7c0cc);
      font-size: 13px;
      line-height: 1.15;
    }
    ha-card .hero-metrics strong {
      grid-area: value;
      color: var(--kia-text-primary, #f4f6f8);
      font-size: 16px;
      font-weight: 800;
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    ha-card .hero-metrics strong.ok { color: var(--kia-status-charging, #7ee787); }
    @media (max-width: 1180px) {
      ha-card .hero-body {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      ha-card .hero-car { height: 220px; }
      ha-card .hero-metrics {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        border-left: 0;
        padding-left: 0;
      }
    }
    @media (max-width: 760px) {
      ha-card #content,
      ha-card .hero-shell { min-height: 500px; }
      ha-card .hero-top { flex-direction: column; }
      ha-card .hero-chips { justify-content: flex-start; }
      ha-card .hero-car { height: 190px; }
      ha-card .hero-metrics { grid-template-columns: 1fr 1fr; gap: 14px; }
    }
