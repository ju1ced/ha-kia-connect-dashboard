---
view_layout:
  grid-area: hero
type: custom:button-card
entity: battery.charging_state
triggers_update:
  - battery.charging_state
  - climate/hvac
  - battery.level
  - location.odometer
  - controls.last_refresh_result
variables:
  charging_entity: battery.charging_state
  climate_entity: climate/hvac
  battery_entity: battery.level
  odometer_entity: location.odometer
  updated_entity: controls.last_refresh_result
show_icon: false
show_name: false
show_state: false
tap_action:
  action: more-info
  entity: location.tracker
custom_fields:
  identity: |
    [[[ return '<div class="hero-identity"><ha-icon icon="mdi:car-electric"></ha-icon><div><strong>Kia EV6</strong><span>GT-Line RWD</span></div></div>'; ]]]
  locked: |
    [[[ return '<ha-icon icon="mdi:lock"></ha-icon><span>Locked</span>'; ]]]
  online: |
    [[[ return '<ha-icon icon="mdi:wifi"></ha-icon><span>Online</span>'; ]]]
  battery: |
    [[[
      var entity = states[variables.battery_entity] || null;
      var state = entity && entity.state && entity.state !== 'unknown' ? entity.state : '--';
      var unit = entity && entity.attributes && entity.attributes.unit_of_measurement ? entity.attributes.unit_of_measurement : '%';
      return '<ha-icon icon="mdi:battery-high"></ha-icon><span>' + state + unit + '</span><small>Battery</small>';
    ]]]
  car: |
    [[[
      var chargingEntity = states[variables.charging_entity] || null;
      var climateEntity = states[variables.climate_entity] || null;
      var chargingState = chargingEntity && chargingEntity.state ? String(chargingEntity.state).toLowerCase() : '';
      var climateState = climateEntity && climateEntity.state ? String(climateEntity.state).toLowerCase() : '';
      var charging = chargingState === 'on' || chargingState === 'charging';
      var inactiveClimate = ['off', 'unavailable', 'unknown', 'none', ''].indexOf(climateState) !== -1;
      var image = charging ? 'ev6_charging.png' : (!inactiveClimate ? 'ev6_climate.png' : 'ev6_side.png');
      return '<img src="/local/vehicles/' + image + '" alt="Kia EV6" loading="eager">';
    ]]]
  metrics: |
    [[[
      function value(id, fallback) {
        var e = states[id] || null;
        if (!e || !e.state || e.state === 'unknown' || e.state === 'unavailable') return fallback;
        var unit = e.attributes && e.attributes.unit_of_measurement ? ' ' + e.attributes.unit_of_measurement : '';
        return e.state + unit;
      }
      var chargingEntity = states[variables.charging_entity] || null;
      var chargingState = chargingEntity && chargingEntity.state ? String(chargingEntity.state).toLowerCase() : '';
      var charging = chargingState === 'on' || chargingState === 'charging';
      var climateEntity = states[variables.climate_entity] || null;
      var climateState = climateEntity && climateEntity.state ? String(climateEntity.state).toLowerCase() : 'unknown';
      var climate = ['off', 'unknown', 'unavailable', 'none', ''].indexOf(climateState) !== -1 ? 'Off' : climateState;
      return '<div class="metric-grid">'
        + '<div><ha-icon icon="mdi:speedometer"></ha-icon><span>Odometer</span><strong>' + value(variables.odometer_entity, '--') + '</strong></div>'
        + '<div><ha-icon icon="mdi:ev-plug-type2"></ha-icon><span>Charging state</span><strong class="' + (charging ? 'ok' : 'muted') + '">' + (charging ? 'Charging' : 'Not charging') + '</strong></div>'
        + '<div><ha-icon icon="mdi:calendar-clock"></ha-icon><span>Last updated</span><strong>' + value(variables.updated_entity, '--') + '</strong></div>'
        + '<div><ha-icon icon="mdi:thermometer"></ha-icon><span>Climate</span><strong>' + climate + '</strong></div>'
        + '</div>';
    ]]]
styles:
  card:
    - min-height: 238px
    - border-radius: 18px
    - padding: 18px 20px
    - overflow: hidden
    - background: var(--kia-hero-gradient, linear-gradient(145deg, rgba(17, 21, 28, 0.98), rgba(32, 36, 45, 0.94)))
    - border: var(--kia-card-border, 1px solid rgba(92, 200, 255, 0.18))
    - box-shadow: var(--kia-shadow-raised, 0 22px 54px rgba(0, 0, 0, 0.36))
  grid:
    - "grid-template-areas: 'identity identity identity locked online battery' 'car car car car metrics metrics'"
    - grid-template-columns: minmax(140px, 1fr) minmax(0, 1fr) minmax(0, 1fr) minmax(118px, auto) minmax(118px, auto) minmax(118px, auto)
    - grid-template-rows: min-content 1fr
    - column-gap: 14px
    - row-gap: 12px
  custom_fields:
    identity:
      - align-self: start
      - justify-self: start
      - min-width: 0
    locked:
      - align-self: start
      - justify-self: end
      - padding: 9px 14px
      - border-radius: 14px
      - background: rgba(92, 200, 255, 0.1)
      - color: var(--kia-brand-primary, #5cc8ff)
      - font-weight: 700
      - white-space: nowrap
    online:
      - align-self: start
      - justify-self: end
      - padding: 9px 14px
      - border-radius: 14px
      - background: rgba(126, 231, 135, 0.1)
      - color: var(--kia-status-charging, #7ee787)
      - font-weight: 700
      - white-space: nowrap
    battery:
      - align-self: start
      - justify-self: end
      - padding: 9px 14px
      - border-radius: 14px
      - background: rgba(92, 200, 255, 0.1)
      - color: var(--kia-text-primary, #f4f6f8)
      - font-weight: 700
      - white-space: nowrap
    car:
      - align-self: end
      - justify-self: stretch
      - height: 166px
      - min-width: 0
      - pointer-events: none
    metrics:
      - align-self: center
      - justify-self: stretch
      - min-width: 0
card_mod:
  style: |
    ha-card .hero-identity {
      display: flex;
      align-items: center;
      gap: 14px;
      color: var(--kia-text-primary, #f4f6f8);
    }
    ha-card .hero-identity ha-icon {
      width: 46px;
      height: 46px;
      color: var(--kia-text-primary, #f4f6f8);
    }
    ha-card .hero-identity strong {
      display: block;
      font-size: clamp(28px, 2.2vw, 38px);
      line-height: 1.05;
      font-weight: 800;
    }
    ha-card .hero-identity span {
      color: var(--kia-text-secondary, #b7c0cc);
      display: block;
      font-size: 16px;
      line-height: 1.2;
      margin-top: 3px;
    }
    ha-card #locked ha-icon,
    ha-card #online ha-icon,
    ha-card #battery ha-icon {
      width: 18px;
      margin-right: 8px;
      vertical-align: -4px;
    }
    ha-card #battery small {
      display: block;
      margin-left: 26px;
      margin-top: -2px;
      color: var(--kia-text-secondary, #b7c0cc);
      font-size: 11px;
      font-weight: 600;
    }
    ha-card #car img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: left bottom;
      filter: drop-shadow(0 20px 28px rgba(0, 0, 0, 0.45));
    }
    ha-card .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px 28px;
      border-left: 1px solid rgba(183, 192, 204, 0.16);
      padding-left: 30px;
    }
    ha-card .metric-grid div {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      grid-template-areas: 'icon label' 'icon value';
      align-items: center;
      min-width: 0;
    }
    ha-card .metric-grid ha-icon {
      grid-area: icon;
      width: 24px;
      color: var(--kia-text-secondary, #b7c0cc);
    }
    ha-card .metric-grid span {
      grid-area: label;
      color: var(--kia-text-secondary, #b7c0cc);
      font-size: 13px;
      line-height: 1.15;
    }
    ha-card .metric-grid strong {
      grid-area: value;
      color: var(--kia-text-primary, #f4f6f8);
      font-size: 16px;
      font-weight: 700;
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    ha-card .metric-grid strong.ok { color: var(--kia-status-charging, #7ee787); }
    ha-card .metric-grid strong.muted { color: var(--kia-status-charging, #7ee787); }
    @media (max-width: 760px) {
      ha-card {
        min-height: 420px !important;
      }
      ha-card #locked,
      ha-card #online,
      ha-card #battery {
        justify-self: start !important;
      }
      ha-card #car {
        height: 150px !important;
      }
      ha-card .metric-grid {
        grid-template-columns: 1fr !important;
        gap: 12px !important;
        border-left: 0 !important;
        padding-left: 0 !important;
      }
    }
