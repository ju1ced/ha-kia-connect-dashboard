---
view_layout:
  grid-area: hero
type: custom:button-card
entity: battery.charging_state
triggers_update:
  - battery.charging_state
  - climate/hvac
  - location.odometer
  - controls.last_refresh_result
variables:
  charging_entity: battery.charging_state
  climate_entity: climate/hvac
  odometer_entity: location.odometer
  updated_entity: controls.last_refresh_result
show_icon: false
show_name: false
show_state: false
tap_action:
  action: more-info
  entity: location.tracker
custom_fields:
  content: |
    [[[
      function value(id, fallback) {
        var e = states[id] || null;
        if (!e || !e.state || e.state === 'unknown' || e.state === 'unavailable') return fallback;
        var unit = e.attributes && e.attributes.unit_of_measurement ? ' ' + e.attributes.unit_of_measurement : '';
        return e.state + unit;
      }
      var chargingEntity = states[variables.charging_entity] || null;
      var chargingState = chargingEntity && chargingEntity.state ? String(chargingEntity.state).toLowerCase() : '';
      var charging = chargingState === 'on' || chargingState === 'charging';
      var climateEntity = states[variables.climate_entity] || null;
      var climateState = climateEntity && climateEntity.state ? String(climateEntity.state).toLowerCase() : 'unknown';
      var climateInactive = ['off', 'unknown', 'unavailable', 'none', ''].indexOf(climateState) !== -1;
      var climate = climateInactive ? 'Off' : climateState;
      var imageName = charging ? 'ev6_charging.png' : (!climateInactive ? 'ev6_climate.png' : 'ev6_' + 'front_right.png');
      var image = '/local/vehicles/' + imageName;
      return '<div class="hero-panel">'
        + '<div class="hero-car"><img src="' + image + '" alt="Kia EV6" loading="eager"></div>'
        + '<div class="hero-metrics">'
        + '<div class="metric"><ha-icon icon="mdi:speedometer"></ha-icon><span>Odometer</span><strong>' + value(variables.odometer_entity, '--') + '</strong></div>'
        + '<div class="metric"><ha-icon icon="mdi:ev-plug-type2"></ha-icon><span>Charging state</span><strong class="ok">' + (charging ? 'Charging' : 'Not charging') + '</strong></div>'
        + '<div class="metric"><ha-icon icon="mdi:calendar-clock"></ha-icon><span>Last updated</span><strong>' + value(variables.updated_entity, '--') + '</strong></div>'
        + '<div class="metric"><ha-icon icon="mdi:thermometer"></ha-icon><span>Climate</span><strong>' + climate + '</strong></div>'
        + '</div></div>';
    ]]]
styles:
  card:
    - min-height: 246px
    - border-radius: 18px
    - padding: 0
    - overflow: hidden
    - background: var(--kia-hero-gradient, linear-gradient(145deg, rgba(17, 21, 28, 0.98), rgba(32, 36, 45, 0.94)))
    - border: var(--kia-card-border, 1px solid rgba(92, 200, 255, 0.18))
    - box-shadow: var(--kia-shadow-raised, 0 22px 54px rgba(0, 0, 0, 0.36))
  grid:
    - "grid-template-areas: 'content'"
    - grid-template-columns: 1fr
    - grid-template-rows: 1fr
  custom_fields:
    content:
      - display: block
      - align-self: stretch
      - justify-self: stretch
      - width: 100%
      - height: 100%
      - min-width: 0
      - min-height: 0
      - text-align: left
card_mod:
  style: |
    ha-card #container,
    ha-card #root,
    ha-card #content {
      width: 100% !important;
      height: 100% !important;
      min-width: 0 !important;
      text-align: left !important;
      align-items: stretch !important;
      justify-items: stretch !important;
    }
    ha-card #content {
      display: block !important;
      min-height: 246px;
    }
    ha-card .hero-panel {
      width: 100%;
      min-height: 246px;
      display: grid;
      grid-template-columns: minmax(0, 1.65fr) minmax(430px, 0.72fr);
      align-items: center;
      gap: clamp(18px, 3.2vw, 48px);
      padding: 12px clamp(24px, 3vw, 42px) 10px;
      box-sizing: border-box;
    }
    ha-card .hero-car {
      height: clamp(218px, 18vw, 292px);
      min-width: 0;
      align-self: center;
      justify-self: stretch;
      overflow: visible;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }
    ha-card .hero-car img {
      display: block;
      width: min(86%, 820px);
      height: 100%;
      object-fit: contain;
      object-position: right center;
      transform: scale(1.2);
      transform-origin: right center;
      filter: drop-shadow(0 22px 30px rgba(0, 0, 0, 0.52));
    }
    ha-card .hero-metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(150px, 1fr));
      grid-auto-rows: minmax(52px, auto);
      align-items: center;
      gap: 20px 32px;
      border-left: 1px solid rgba(183, 192, 204, 0.16);
      padding-left: clamp(24px, 2.8vw, 40px);
      min-width: 0;
      justify-self: stretch;
    }
    ha-card .metric {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      grid-template-areas: 'icon label' 'icon value';
      align-items: center;
      min-width: 0;
    }
    ha-card .metric ha-icon {
      grid-area: icon;
      width: 28px;
      height: 28px;
      color: var(--kia-text-secondary, #b7c0cc);
      opacity: 0.96;
    }
    ha-card .metric span {
      grid-area: label;
      color: var(--kia-text-secondary, #b7c0cc);
      font-size: clamp(12px, 0.9vw, 15px);
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    ha-card .metric strong {
      grid-area: value;
      color: var(--kia-text-primary, #f4f6f8);
      font-size: clamp(15px, 1.05vw, 19px);
      font-weight: 800;
      line-height: 1.12;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    ha-card .metric strong.ok { color: var(--kia-status-charging, #7ee787); }
    @media (max-width: 1180px) {
      ha-card .hero-panel {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 12px 22px 18px;
      }
      ha-card .hero-car {
        height: clamp(190px, 26vw, 250px);
        justify-content: center;
      }
      ha-card .hero-car img {
        width: min(94%, 760px);
        transform-origin: center center;
      }
      ha-card .hero-metrics {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        border-left: 0;
        border-top: 1px solid rgba(183, 192, 204, 0.12);
        padding: 16px 0 0;
        gap: 16px;
      }
      ha-card .metric {
        grid-template-columns: 30px minmax(0, 1fr);
      }
      ha-card .metric ha-icon {
        width: 22px;
        height: 22px;
      }
    }
    @media (max-width: 760px) {
      ha-card #content,
      ha-card .hero-panel {
        min-height: 430px;
      }
      ha-card .hero-car {
        height: 205px;
      }
      ha-card .hero-metrics {
        grid-template-columns: 1fr 1fr;
      }
    }
