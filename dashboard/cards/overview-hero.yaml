---
view_layout:
  grid-area: hero
type: custom:button-card
entity: battery.charging_state
triggers_update:
  - battery.charging_state
  - climate/hvac
variables:
  charging_entity: battery.charging_state
  climate_entity: climate/hvac
name: Kia EV6
label: GT-Line RWD
icon: mdi:car-electric
show_label: true
show_state: false
tap_action:
  action: more-info
  entity: location.tracker
custom_fields:
  locked: |
    [[[ return '<ha-icon icon="mdi:lock"></ha-icon><span>Locked</span>'; ]]]
  online: |
    [[[ return '<ha-icon icon="mdi:wifi"></ha-icon><span>Online</span>'; ]]]
  battery: |
    [[[ return '<ha-icon icon="mdi:battery-high"></ha-icon><span>EV6</span>'; ]]]
  copy: |
    [[[ return '<span>Live vehicle overview</span><small>Battery, charging, vehicle state and location at a glance.</small>'; ]]]
  car: |
    [[[
      const chargingState = states[variables.charging_entity]?.state;
      const climateState = states[variables.climate_entity]?.state;
      const charging = ['on', 'charging'].includes(String(chargingState).toLowerCase());
      const climateActive = !['off', 'unavailable', 'unknown', 'none', ''].includes(String(climateState).toLowerCase());
      const image = charging
        ? 'ev6_charging.png'
        : climateActive
          ? 'ev6_climate.png'
          : 'ev6_side.png';
      return `<img src="/local/vehicles/${image}" alt="Kia EV6" loading="eager">`;
    ]]]
styles:
  card:
    - min-height: 290px
    - border-radius: 22px
    - padding: 24px
    - overflow: hidden
    - background: var(--kia-hero-gradient, linear-gradient(145deg, rgba(17, 21, 28, 0.98), rgba(32, 36, 45, 0.94)))
    - border: var(--kia-card-border, 1px solid rgba(92, 200, 255, 0.18))
    - box-shadow: var(--kia-shadow-raised, 0 22px 54px rgba(0, 0, 0, 0.36))
  grid:
    - "grid-template-areas: 'i n locked online battery' 'i l locked online battery' 'copy copy car car car'"
    - grid-template-columns: 56px minmax(0, 1fr) min-content min-content min-content
    - grid-template-rows: min-content min-content 1fr
    - column-gap: 14px
    - row-gap: 10px
  icon:
    - width: 44px
    - color: var(--kia-text-primary, #f4f6f8)
  name:
    - justify-self: start
    - align-self: end
    - width: 100%
    - font-size: clamp(30px, 2.6vw, 42px)
    - font-weight: 800
    - line-height: 1.05
    - white-space: normal
    - overflow: visible
    - text-overflow: unset
    - color: var(--kia-text-primary, #f4f6f8)
  label:
    - justify-self: start
    - width: 100%
    - font-size: 17px
    - line-height: 1.25
    - white-space: normal
    - overflow: visible
    - text-overflow: unset
    - color: var(--kia-text-secondary, #b7c0cc)
  custom_fields:
    locked:
      - align-self: start
      - padding: 10px 14px
      - border-radius: 14px
      - background: rgba(92, 200, 255, 0.1)
      - color: var(--kia-brand-primary, #5cc8ff)
      - font-weight: 700
      - white-space: nowrap
    online:
      - align-self: start
      - padding: 10px 14px
      - border-radius: 14px
      - background: rgba(126, 231, 135, 0.1)
      - color: var(--kia-status-charging, #7ee787)
      - font-weight: 700
      - white-space: nowrap
    battery:
      - align-self: start
      - padding: 10px 14px
      - border-radius: 14px
      - background: rgba(92, 200, 255, 0.1)
      - color: var(--kia-text-primary, #f4f6f8)
      - font-weight: 700
      - white-space: nowrap
    copy:
      - align-self: end
      - justify-self: start
      - color: var(--kia-text-secondary, #b7c0cc)
      - font-size: 15px
      - font-weight: 700
      - line-height: 1.35
      - max-width: 360px
      - padding-bottom: 8px
      - text-align: left
    car:
      - align-self: end
      - justify-self: end
      - width: min(860px, 72vw)
      - max-width: 70%
      - height: 200px
      - pointer-events: none
      - margin-bottom: -10px
card_mod:
  style: |
    ha-card #locked ha-icon,
    ha-card #online ha-icon,
    ha-card #battery ha-icon {
      width: 18px;
      margin-right: 8px;
      vertical-align: -4px;
    }
    ha-card #copy small {
      display: block;
      margin-top: 4px;
      color: var(--kia-text-muted, #8a94a3);
      font-size: 13px;
      font-weight: 600;
    }
    ha-card #car img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: right bottom;
      filter: drop-shadow(0 20px 28px rgba(0, 0, 0, 0.42));
    }
    @media (max-width: 760px) {
      ha-card {
        min-height: 360px !important;
      }
      ha-card #car {
        width: 100% !important;
        max-width: 100% !important;
        height: 150px !important;
      }
    }
