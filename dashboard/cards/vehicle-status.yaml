---
view_layout:
  grid-area: vehicle
type: custom:button-card
entity: locks.door_lock
triggers_update:
  - locks.door_lock
  - openings.trunk
  - openings.hood
  - lights.headlights
  - locks.charging_port
variables:
  door_lock_entity: locks.door_lock
  trunk_entity: openings.trunk
  hood_entity: openings.hood
  lights_entity: lights.headlights
  charge_port_entity: locks.charging_port
show_icon: false
show_name: false
show_state: false
tap_action:
  action: more-info
  entity: locks.door_lock
custom_fields:
  content: |
    [[[
      function stateText(id, fallback) {
        var e = states[id] || null;
        if (!e || !e.state || e.state === 'unknown' || e.state === 'unavailable') return fallback;
        return e.state;
      }
      var shell = 'height:100%;min-height:242px;box-sizing:border-box;padding:16px 18px;display:grid;grid-template-rows:32px 1fr;gap:14px;';
      var title = 'display:flex;align-items:center;gap:10px;color:var(--kia-text-primary,#f4f6f8);font-size:17px;font-weight:800;';
      var list = 'display:grid;grid-template-columns:1fr;gap:8px;align-content:center;width:100%;height:100%;min-width:0;';
      function row(icon, label, id, fallback) {
        var value = stateText(id, fallback);
        return '<div style="display:grid;grid-template-columns:30px minmax(110px,1fr) minmax(74px,auto) 24px;align-items:center;gap:10px;width:100%;min-width:0;color:var(--kia-text-secondary,#b7c0cc);">'
          + '<ha-icon icon="' + icon + '" style="width:20px;color:var(--kia-text-secondary,#b7c0cc)"></ha-icon>'
          + '<span style="font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + label + '</span>'
          + '<strong style="color:var(--kia-text-primary,#f4f6f8);font-size:14px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;">' + value + '</strong>'
          + '<ha-icon icon="mdi:check-circle-outline" style="width:18px;color:var(--kia-status-charging,#7ee787);justify-self:end;"></ha-icon>'
          + '</div>';
      }
      return '<div style="' + shell + '">'
        + '<div style="' + title + '"><ha-icon icon="mdi:car-estate" style="width:20px;color:var(--kia-text-secondary,#b7c0cc)"></ha-icon><span>Vehicle Status</span><ha-icon icon="mdi:chevron-right" style="margin-left:auto;width:20px;color:var(--kia-text-secondary,#b7c0cc)"></ha-icon></div>'
        + '<div style="' + list + '">'
        + row('mdi:car-door-lock', 'Doors', variables.door_lock_entity, '--')
        + row('mdi:car-window-closed', 'Windows', variables.door_lock_entity, '--')
        + row('mdi:car-back', 'Trunk', variables.trunk_entity, '--')
        + row('mdi:car-cog', 'Hood', variables.hood_entity, '--')
        + row('mdi:car-light-high', 'Lights', variables.lights_entity, '--')
        + row('mdi:ev-plug-type2', 'Charge port', variables.charge_port_entity, '--')
        + '</div></div>';
    ]]]
styles:
  card:
    - min-height: 242px
    - border-radius: 14px
    - padding: 0
    - background: var(--kia-card-background, rgba(21, 27, 36, 0.94))
    - border: var(--kia-card-border, 1px solid rgba(92, 200, 255, 0.16))
    - box-shadow: var(--kia-shadow-card, 0 16px 34px rgba(0, 0, 0, 0.24))
  grid:
    - "grid-template-areas: 'content'"
    - grid-template-columns: 1fr
    - grid-template-rows: 1fr
  custom_fields:
    content:
      - display: block
      - align-self: stretch
      - justify-self: stretch
      - width: 100%
      - height: 100%
      - min-width: 0
      - text-align: left
card_mod:
  style: |
    ha-card #container,
    ha-card #root,
    ha-card #content {
      width: 100% !important;
      height: 100% !important;
      min-width: 0 !important;
      text-align: left !important;
      align-items: stretch !important;
      justify-items: stretch !important;
    }
    ha-card #content { display: block !important; }
