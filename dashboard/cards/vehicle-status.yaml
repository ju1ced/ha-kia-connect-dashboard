---
view_layout:
  grid-area: vehicle
type: vertical-stack
cards:
  - type: custom:decluttering-card
    template: kia_visual_stat_tile
    variables:
      - entity: locks.door_lock
      - name: Door lock
      - icon: mdi:car-door-lock
      - label: Security
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: openings.trunk
          - name: Trunk
          - icon: mdi:car-back
          - label: Opening
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: openings.hood
          - name: Hood
          - icon: mdi:car-cog
          - label: Opening
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: lights.headlights
          - name: Lights
          - icon: mdi:car-light-high
          - label: Headlights
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: locks.charging_port
          - name: Charge port
          - icon: mdi:ev-plug-type2
          - label: Port state
