---
view_layout:
  grid-area: battery
type: vertical-stack
cards:
  - type: custom:decluttering-card
    template: kia_visual_stat_tile
    variables:
      - entity: battery.level
      - name: Battery level
      - icon: mdi:battery-high
      - label: State of charge
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: battery.estimated_range
          - name: Range
          - icon: mdi:map-marker-distance
          - label: Estimated range
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: battery.charging_state
          - name: Charging
          - icon: mdi:battery-charging
          - label: Current state
