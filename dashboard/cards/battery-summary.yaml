---
view_layout:
  grid-area: battery
type: custom:button-card
entity: battery.level
triggers_update:
  - battery.level
  - battery.estimated_range
  - battery.charging_state
  - battery.plug_connected
  - battery.target_charge_limit
variables:
  level_entity: battery.level
  range_entity: battery.estimated_range
  charging_entity: battery.charging_state
  plug_entity: battery.plug_connected
  limit_entity: battery.target_charge_limit
show_icon: false
show_name: false
show_state: false
tap_action:
  action: more-info
  entity: battery.level
custom_fields:
  content: |
    [[[
      function value(id, fallback) {
        var e = states[id] || null;
        if (!e || !e.state || e.state === 'unknown' || e.state === 'unavailable') return fallback;
        var unit = e.attributes && e.attributes.unit_of_measurement ? ' ' + e.attributes.unit_of_measurement : '';
        return e.state + unit;
      }
      var e = states[variables.level_entity] || null;
      var raw = e && e.state ? parseFloat(e.state) : NaN;
      var level = isNaN(raw) ? 0 : Math.max(0, Math.min(100, raw));
      var textValue = isNaN(raw) ? '--' : Math.round(level) + '%';
      var charge = states[variables.charging_entity] || null;
      var chargeState = charge && charge.state ? String(charge.state).toLowerCase() : '';
      var charging = chargeState === 'on' || chargeState === 'charging';
      var plug = states[variables.plug_entity] || null;
      var plugState = plug && plug.state ? String(plug.state).toLowerCase() : 'unknown';
      var shell = 'height:100%;min-height:242px;box-sizing:border-box;padding:16px 18px;display:grid;grid-template-rows:32px 1fr;gap:14px;';
      var title = 'display:flex;align-items:center;gap:10px;color:var(--kia-text-primary,#f4f6f8);font-size:17px;font-weight:800;';
      var body = 'display:grid;grid-template-columns:minmax(160px,.95fr) minmax(175px,1.05fr);gap:20px;align-items:center;width:100%;height:100%;min-width:0;';
      var ring = 'width:min(176px,72%);aspect-ratio:1;border-radius:50%;display:grid;place-items:center;position:relative;justify-self:center;background:conic-gradient(var(--kia-brand-primary,#5cc8ff) ' + level + '%, rgba(92,200,255,.14) 0);box-shadow:inset 0 0 18px rgba(92,200,255,.16),0 0 28px rgba(92,200,255,.16);';
      var before = 'position:absolute;width:73%;aspect-ratio:1;border-radius:50%;background:var(--kia-card-background,#151b24);';
      var list = 'display:grid;grid-template-columns:1fr;gap:7px;align-content:center;min-width:0;';
      function detail(label, valueText, klass) {
        var color = klass ? 'color:var(--kia-status-charging,#7ee787);' : 'color:var(--kia-text-primary,#f4f6f8);';
        return '<div style="min-width:0"><span style="display:block;color:var(--kia-text-secondary,#b7c0cc);font-size:12px;line-height:1.1;">' + label + '</span><strong style="display:block;' + color + 'font-size:16px;font-weight:800;line-height:1.15;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + valueText + '</strong></div>';
      }
      return '<div style="' + shell + '">'
        + '<div style="' + title + '"><ha-icon icon="mdi:battery-charging-high" style="width:20px;color:var(--kia-brand-primary,#5cc8ff)"></ha-icon><span>Battery</span><ha-icon icon="mdi:chevron-right" style="margin-left:auto;width:20px;color:var(--kia-text-secondary,#b7c0cc)"></ha-icon></div>'
        + '<div style="' + body + '">'
        + '<div style="' + ring + '"><div style="' + before + '"></div><div style="position:relative;z-index:1;text-align:center"><strong style="display:block;color:var(--kia-text-primary,#f4f6f8);font-size:36px;font-weight:800;line-height:1;">' + textValue + '</strong><span style="display:block;color:var(--kia-text-secondary,#b7c0cc);font-size:12px;margin-top:5px;">Battery level</span></div></div>'
        + '<div style="' + list + '">'
        + detail('Range', value(variables.range_entity, '--'))
        + detail('Est. range AC on', value(variables.range_entity, '--'))
        + detail('AC charging limit', value(variables.limit_entity, '--'))
        + detail('Charging', charging ? 'Charging' : 'Not charging', true)
        + detail('Plugged in', (plugState === 'on' || plugState === 'connected') ? 'Yes' : 'No')
        + '</div></div></div>';
    ]]]
styles:
  card:
    - min-height: 242px
    - border-radius: 14px
    - padding: 0
    - background: var(--kia-card-background, rgba(21, 27, 36, 0.94))
    - border: var(--kia-card-border, 1px solid rgba(92, 200, 255, 0.16))
    - box-shadow: var(--kia-shadow-card, 0 16px 34px rgba(0, 0, 0, 0.24))
  grid:
    - "grid-template-areas: 'content'"
    - grid-template-columns: 1fr
    - grid-template-rows: 1fr
  custom_fields:
    content:
      - display: block
      - align-self: stretch
      - justify-self: stretch
      - width: 100%
      - height: 100%
      - min-width: 0
      - text-align: left
card_mod:
  style: |
    ha-card #container,
    ha-card #root,
    ha-card #content {
      width: 100% !important;
      height: 100% !important;
      min-width: 0 !important;
      text-align: left !important;
      align-items: stretch !important;
      justify-items: stretch !important;
    }
    ha-card #content { display: block !important; }
