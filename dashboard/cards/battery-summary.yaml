---
view_layout:
  grid-area: battery
type: custom:button-card
entity: battery.level
triggers_update:
  - battery.level
  - battery.estimated_range
  - battery.charging_state
  - battery.plug_connected
  - battery.target_charge_limit
variables:
  level_entity: battery.level
  range_entity: battery.estimated_range
  charging_entity: battery.charging_state
  plug_entity: battery.plug_connected
  limit_entity: battery.target_charge_limit
show_icon: false
show_name: false
show_state: false
tap_action:
  action: more-info
  entity: battery.level
custom_fields:
  content: |
    [[[
      function value(id, fallback) {
        var e = states[id] || null;
        if (!e || !e.state || e.state === 'unknown' || e.state === 'unavailable') return fallback;
        var unit = e.attributes && e.attributes.unit_of_measurement ? ' ' + e.attributes.unit_of_measurement : '';
        return e.state + unit;
      }
      var e = states[variables.level_entity] || null;
      var raw = e && e.state ? parseFloat(e.state) : NaN;
      var level = isNaN(raw) ? 0 : Math.max(0, Math.min(100, raw));
      var text = isNaN(raw) ? '--' : Math.round(level) + '%';
      var charge = states[variables.charging_entity] || null;
      var chargeState = charge && charge.state ? String(charge.state).toLowerCase() : '';
      var charging = chargeState === 'on' || chargeState === 'charging';
      var plug = states[variables.plug_entity] || null;
      var plugState = plug && plug.state ? String(plug.state).toLowerCase() : 'unknown';
      return '<div class="panel-shell battery-panel">'
        + '<div class="panel-title"><ha-icon icon="mdi:battery-charging-high"></ha-icon><span>Battery</span><ha-icon class="chevron" icon="mdi:chevron-right"></ha-icon></div>'
        + '<div class="battery-body">'
        + '<div class="battery-ring" style="--level:' + level + '"><div><strong>' + text + '</strong><span>Battery level</span></div></div>'
        + '<div class="battery-details">'
        + '<div><span>Range</span><strong>' + value(variables.range_entity, '--') + '</strong></div>'
        + '<div><span>Est. range AC on</span><strong>' + value(variables.range_entity, '--') + '</strong></div>'
        + '<div><span>AC charging limit</span><strong>' + value(variables.limit_entity, '--') + '</strong></div>'
        + '<div><span>Charging</span><strong class="ok">' + (charging ? 'Charging' : 'Not charging') + '</strong></div>'
        + '<div><span>Plugged in</span><strong>' + (plugState === 'on' || plugState === 'connected' ? 'Yes' : 'No') + '</strong></div>'
        + '</div></div></div>';
    ]]]
styles:
  card:
    - min-height: 242px
    - border-radius: 14px
    - padding: 0
    - background: var(--kia-card-background, rgba(21, 27, 36, 0.94))
    - border: var(--kia-card-border, 1px solid rgba(92, 200, 255, 0.16))
    - box-shadow: var(--kia-shadow-card, 0 16px 34px rgba(0, 0, 0, 0.24))
  grid:
    - "grid-template-areas: 'content'"
    - grid-template-columns: 1fr
  custom_fields:
    content:
      - align-self: stretch
      - justify-self: stretch
      - min-width: 0
card_mod:
  style: |
    ha-card #content {
      display: block !important;
      width: 100%;
      height: 100%;
      text-align: left !important;
    }
    ha-card .panel-shell {
      width: 100%;
      min-height: 242px;
      box-sizing: border-box;
      padding: 16px 18px;
    }
    ha-card .panel-title {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--kia-text-primary, #f4f6f8);
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 14px;
    }
    ha-card .panel-title ha-icon { color: var(--kia-brand-primary, #5cc8ff); width: 20px; }
    ha-card .panel-title .chevron { margin-left: auto; color: var(--kia-text-secondary, #b7c0cc); }
    ha-card .battery-body {
      display: grid;
      grid-template-columns: minmax(128px, 0.9fr) minmax(132px, 1fr);
      gap: 18px;
      align-items: center;
    }
    ha-card .battery-ring {
      width: min(148px, 100%);
      max-width: 148px;
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      position: relative;
      background: conic-gradient(var(--kia-brand-primary, #5cc8ff) calc(var(--level) * 1%), rgba(92, 200, 255, 0.14) 0);
      box-shadow: inset 0 0 18px rgba(92, 200, 255, 0.16), 0 0 28px rgba(92, 200, 255, 0.16);
    }
    ha-card .battery-ring::before {
      content: '';
      position: absolute;
      width: 73%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--kia-card-background, #151b24);
    }
    ha-card .battery-ring div { position: relative; z-index: 1; text-align: center; }
    ha-card .battery-ring strong { color: var(--kia-text-primary, #f4f6f8); display: block; font-size: clamp(28px, 2vw, 35px); font-weight: 800; line-height: 1; }
    ha-card .battery-ring span { color: var(--kia-text-secondary, #b7c0cc); display: block; font-size: 12px; margin-top: 5px; }
    ha-card .battery-details { display: grid; grid-template-columns: 1fr; gap: 8px; min-width: 0; }
    ha-card .battery-details span { color: var(--kia-text-secondary, #b7c0cc); display: block; font-size: 12px; line-height: 1.1; }
    ha-card .battery-details strong { color: var(--kia-text-primary, #f4f6f8); display: block; font-size: 16px; font-weight: 800; line-height: 1.15; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    ha-card .battery-details strong.ok { color: var(--kia-status-charging, #7ee787); }
    @media (max-width: 1180px) {
      ha-card .battery-body { grid-template-columns: 140px minmax(0, 1fr); }
    }
    @media (max-width: 760px) {
      ha-card .battery-body { grid-template-columns: 1fr; }
      ha-card .battery-ring { justify-self: center; }
    }
