---
type: vertical-stack
cards:
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: battery.estimated_range
          - name: Estimated range
          - icon: mdi:map-marker-distance
          - label: Remaining driving range
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: battery.level
          - name: State of charge
          - icon: mdi:battery-high
          - label: EV battery level
  - type: custom:decluttering-card
    template: kia_visual_text_panel
    variables:
      - title: Range Context
      - content: >-
          Range trends and climate-aware range notes will live here once the
          shared chart pattern is added.
