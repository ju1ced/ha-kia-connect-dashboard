---
type: vertical-stack
cards:
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: locks.door_lock
          - name: Door lock
          - icon: mdi:car-door-lock
          - label: Vehicle security
      - type: custom:decluttering-card
        template: kia_visual_stat_tile
        variables:
          - entity: locks.charging_port
          - name: Charge port
          - icon: mdi:ev-plug-type2
          - label: Port state
  - type: custom:decluttering-card
    template: kia_visual_text_panel
    variables:
      - title: Locks
      - content: >-
          Lock controls can be connected after command confirmation and action
          safety patterns are reviewed.
