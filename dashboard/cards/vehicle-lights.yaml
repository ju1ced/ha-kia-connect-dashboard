---
type: vertical-stack
cards:
  - type: custom:decluttering-card
    template: kia_mapped_state_row
    variables:
      - entity: lights.headlights
      - name: Headlights
      - icon: mdi:car-light-high
  - type: custom:decluttering-card
    template: kia_mapped_section_note
    variables:
      - title: Lights
      - content: >-
          The current integration exposes headlamp status and hazard-light
          command buttons. Hazard command controls should stay disabled until
          command confirmation behavior is reviewed.
