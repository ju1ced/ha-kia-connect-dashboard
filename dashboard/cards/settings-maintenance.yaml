---
type: vertical-stack
cards:
  - type: custom:decluttering-card
    template: kia_mapped_state_row
    variables:
      - entity: controls.last_refresh_result
      - name: Last refresh scan
      - icon: mdi:refresh-circle
  - type: custom:decluttering-card
    template: kia_mapped_state_row
    variables:
      - entity: controls.last_climate_result
      - name: Climate command state
      - icon: mdi:air-conditioner
  - type: custom:decluttering-card
    template: kia_mapped_state_row
    variables:
      - entity: controls.last_charging_result
      - name: Charging command state
      - icon: mdi:ev-station
  - type: custom:decluttering-card
    template: kia_mapped_state_row
    variables:
      - entity: settings.mapping
      - name: Vehicle data details
      - icon: mdi:file-cog
  - type: custom:decluttering-card
    template: kia_mapped_section_note
    variables:
      - title: Maintenance
      - content: >-
          Maintenance uses entities available from the current Kia integration:
          latest scan, climate state, charging state, and raw vehicle data.
          Repository-side mapping health is still checked with
          scripts/check_runtime_mapping_health.py before rendering.
