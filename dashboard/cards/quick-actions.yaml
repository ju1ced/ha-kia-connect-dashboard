---
view_layout:
  grid-area: actions
type: custom:button-card
show_icon: false
show_name: false
show_state: false
tap_action:
  action: none
custom_fields:
  content: |
    [[[
      var shell = 'height:100%;min-height:242px;box-sizing:border-box;padding:16px 18px;display:grid;grid-template-rows:32px 1fr;gap:14px;';
      var title = 'display:flex;align-items:center;gap:10px;color:var(--kia-text-primary,#f4f6f8);font-size:17px;font-weight:800;';
      var grid = 'display:grid;grid-template-columns:repeat(2,minmax(0,1fr));grid-template-rows:repeat(2,minmax(0,1fr));gap:12px;width:100%;height:100%;min-width:0;';
      var btn = 'border:1px solid rgba(92,200,255,.14);border-radius:10px;background:rgba(255,255,255,.025);color:var(--kia-text-primary,#f4f6f8);font:inherit;font-weight:800;display:grid;grid-template-rows:1fr min-content;place-items:center;gap:6px;padding:12px;box-sizing:border-box;min-width:0;min-height:0;';
      var icon = 'width:34px;height:34px;color:var(--kia-brand-primary,#5cc8ff);';
      var text = 'font-size:13px;line-height:1.15;text-align:center;white-space:normal;';
      return '<div style="' + shell + '">'
        + '<div style="' + title + '"><ha-icon icon="mdi:lightning-bolt" style="width:20px;color:var(--kia-brand-primary,#5cc8ff)"></ha-icon><span>Quick Actions</span><ha-icon icon="mdi:chevron-right" style="margin-left:auto;width:20px;color:var(--kia-text-secondary,#b7c0cc)"></ha-icon></div>'
        + '<div style="' + grid + '">'
        + '<button style="' + btn + '"><ha-icon icon="mdi:refresh" style="' + icon + '"></ha-icon><span style="' + text + '">Refresh Data</span></button>'
        + '<button style="' + btn + '"><ha-icon icon="mdi:fan" style="' + icon + '"></ha-icon><span style="' + text + '">Start Climate</span></button>'
        + '<button style="' + btn + '"><ha-icon icon="mdi:fan-off" style="' + icon + 'color:var(--kia-status-warning,#ffd166);"></ha-icon><span style="' + text + '">Stop Climate</span></button>'
        + '<button style="' + btn + '"><ha-icon icon="mdi:ev-plug-type2" style="' + icon + 'color:var(--kia-status-charging,#7ee787);"></ha-icon><span style="' + text + '">Start Charging</span></button>'
        + '</div></div>';
    ]]]
styles:
  card:
    - min-height: 242px
    - border-radius: 14px
    - padding: 0
    - background: var(--kia-card-background, rgba(21, 27, 36, 0.94))
    - border: var(--kia-card-border, 1px solid rgba(92, 200, 255, 0.16))
    - box-shadow: var(--kia-shadow-card, 0 16px 34px rgba(0, 0, 0, 0.24))
  grid:
    - "grid-template-areas: 'content'"
    - grid-template-columns: 1fr
    - grid-template-rows: 1fr
  custom_fields:
    content:
      - display: block
      - align-self: stretch
      - justify-self: stretch
      - width: 100%
      - height: 100%
      - min-width: 0
      - text-align: left
card_mod:
  style: |
    ha-card #container,
    ha-card #root,
    ha-card #content {
      width: 100% !important;
      height: 100% !important;
      min-width: 0 !important;
      text-align: left !important;
      align-items: stretch !important;
      justify-items: stretch !important;
    }
    ha-card #content { display: block !important; }
