---
view_layout:
  grid-area: actions
type: grid
columns: 2
square: false
cards:
  - type: custom:decluttering-card
    template: kia_visual_action_tile
    variables:
      - entity: controls.refresh
      - name: Refresh Data
      - icon: mdi:refresh
      - color: var(--kia-brand-primary)
      - action: none
  - type: custom:decluttering-card
    template: kia_visual_action_tile
    variables:
      - entity: controls.start_climate
      - name: Start Climate
      - icon: mdi:fan
      - color: var(--kia-brand-primary)
      - action: none
  - type: custom:decluttering-card
    template: kia_visual_action_tile
    variables:
      - entity: controls.stop_climate
      - name: Stop Climate
      - icon: mdi:fan-off
      - color: var(--kia-status-warning)
      - action: none
  - type: custom:decluttering-card
    template: kia_visual_action_tile
    variables:
      - entity: controls.start_charging
      - name: Start Charging
      - icon: mdi:ev-plug-type2
      - color: var(--kia-status-charging)
      - action: none
