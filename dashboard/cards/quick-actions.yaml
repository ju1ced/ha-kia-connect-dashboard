---
view_layout:
  grid-area: actions
type: custom:button-card
show_icon: false
show_name: false
show_state: false
tap_action:
  action: none
custom_fields:
  content: |
    [[[ return '<div class="panel-shell actions-panel"><div class="panel-title"><ha-icon icon="mdi:lightning-bolt"></ha-icon><span>Quick Actions</span><ha-icon class="chevron" icon="mdi:chevron-right"></ha-icon></div><div class="actions-grid"><button><ha-icon icon="mdi:refresh"></ha-icon><span>Refresh Data</span></button><button><ha-icon icon="mdi:fan"></ha-icon><span>Start Climate</span></button><button class="warning"><ha-icon icon="mdi:fan-off"></ha-icon><span>Stop Climate</span></button><button class="ok"><ha-icon icon="mdi:ev-plug-type2"></ha-icon><span>Start Charging</span></button></div></div>'; ]]]
styles:
  card:
    - min-height: 242px
    - border-radius: 14px
    - padding: 0
    - background: var(--kia-card-background, rgba(21, 27, 36, 0.94))
    - border: var(--kia-card-border, 1px solid rgba(92, 200, 255, 0.16))
    - box-shadow: var(--kia-shadow-card, 0 16px 34px rgba(0, 0, 0, 0.24))
  grid:
    - "grid-template-areas: 'content'"
    - grid-template-columns: 1fr
  custom_fields:
    content:
      - align-self: stretch
      - justify-self: stretch
      - min-width: 0
card_mod:
  style: |
    ha-card #content { display: block !important; width: 100%; height: 100%; text-align: left !important; }
    ha-card .panel-shell { width: 100%; min-height: 242px; box-sizing: border-box; padding: 16px 18px; }
    ha-card .panel-title { display: flex; align-items: center; gap: 10px; color: var(--kia-text-primary, #f4f6f8); font-size: 17px; font-weight: 800; margin-bottom: 14px; }
    ha-card .panel-title ha-icon { color: var(--kia-brand-primary, #5cc8ff); width: 20px; }
    ha-card .panel-title .chevron { margin-left: auto; color: var(--kia-text-secondary, #b7c0cc); }
    ha-card .actions-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    ha-card .actions-grid button { min-height: 76px; border: 1px solid rgba(92, 200, 255, 0.14); border-radius: 10px; background: rgba(255, 255, 255, 0.025); color: var(--kia-text-primary, #f4f6f8); font: inherit; font-weight: 800; display: grid; place-items: center; gap: 6px; cursor: default; }
    ha-card .actions-grid ha-icon { color: var(--kia-brand-primary, #5cc8ff); width: 28px; height: 28px; }
    ha-card .actions-grid .warning ha-icon { color: var(--kia-status-warning, #ffd166); }
    ha-card .actions-grid .ok ha-icon { color: var(--kia-status-charging, #7ee787); }
    ha-card .actions-grid span { font-size: 13px; line-height: 1.15; text-align: center; }
    @media (max-width: 760px) { ha-card .actions-grid { grid-template-columns: 1fr 1fr; } }
