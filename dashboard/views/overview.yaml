---
title: Overview
path: overview
icon: mdi:car-electric
theme: Kia Horizon
type: panel
badges: []
cards:
  - type: custom:layout-card
    layout_type: custom:grid-layout
    layout:
      margin: 0 auto
      padding: 14px 20px 20px
      max_width: 1560px
      grid-gap: 10px
      grid-template-columns: repeat(12, minmax(0, 1fr))
      grid-template-areas: |
        "header header header header header header header header header header header header"
        "hero hero hero hero hero hero hero hero hero hero hero hero"
        "nav nav nav nav nav nav nav nav nav nav nav nav"
        "battery battery battery battery actions actions actions actions vehicle vehicle vehicle vehicle"
        "location location location location tires tires tires tires status status status status"
      mediaquery:
        "(max-width: 1180px)":
          padding: 12px
          grid-template-columns: repeat(6, minmax(0, 1fr))
          grid-template-areas: |
            "header header header header header header"
            "hero hero hero hero hero hero"
            "nav nav nav nav nav nav"
            "battery battery battery actions actions actions"
            "vehicle vehicle vehicle vehicle vehicle vehicle"
            "location location location tires tires tires"
            "status status status status status status"
        "(max-width: 760px)":
          padding: 10px
          grid-gap: 10px
          grid-template-columns: minmax(0, 1fr)
          grid-template-areas: |
            "header"
            "hero"
            "nav"
            "battery"
            "actions"
            "vehicle"
            "location"
            "tires"
            "status"
    cards:
      - !include ../cards/overview-header.yaml
      - !include ../cards/overview-hero.yaml
      - !include ../cards/section-navigation.yaml
      - !include ../cards/battery-summary.yaml
      - !include ../cards/quick-actions.yaml
      - !include ../cards/vehicle-status.yaml
      - !include ../cards/location-summary.yaml
      - !include ../cards/tire-status.yaml
      - !include ../cards/overview-footer.yaml
