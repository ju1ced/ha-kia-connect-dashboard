---
kia_mapped_state_row:
  default:
    - icon: mdi:information-outline
    - secondary_info: none
  card:
    type: entity
    entity: "[[entity]]"
    name: "[[name]]"
    icon: "[[icon]]"
    secondary_info: "[[secondary_info]]"

kia_mapped_action_button:
  default:
    - icon: mdi:gesture-tap-button
    - action: none
  card:
    type: button
    entity: "[[entity]]"
    name: "[[name]]"
    icon: "[[icon]]"
    show_state: false
    tap_action:
      action: "[[action]]"

kia_mapped_perform_action_button:
  default:
    - icon: mdi:gesture-tap-button
    - perform_action: button.press
  card:
    type: button
    entity: "[[entity]]"
    name: "[[name]]"
    icon: "[[icon]]"
    show_state: false
    tap_action:
      action: perform-action
      perform_action: "[[perform_action]]"
      target:
        entity_id: "[[entity]]"

kia_mapped_confirm_action_button:
  default:
    - icon: mdi:gesture-tap-button
    - action: none
    - confirmation: false
    - confirmation_text: Confirm this action?
  card:
    type: button
    entity: "[[entity]]"
    name: "[[name]]"
    icon: "[[icon]]"
    show_state: false
    tap_action:
      action: "[[action]]"
      confirmation:
        text: "[[confirmation_text]]"

kia_mapped_section_note:
  card:
    type: markdown
    title: "[[title]]"
    content: >-
      [[content]]

kia_mapped_entity_diagnostics:
  default:
    - title: Entity Diagnostics
    - content: >-
        If a row shows unavailable or unknown, review the matching logical key
        in dashboard/templates/entities.yaml before changing card files.
  card:
    type: markdown
    title: "[[title]]"
    content: >-
      [[content]]

kia_inline_mapping_alert:
  default:
    - icon: mdi:alert-circle-outline
    - severity: Warning
  card:
    type: markdown
    title: "[[severity]]"
    content: >-
      **[[icon]] [[title]]**

      [[content]]

kia_visual_nav_tile:
  card:
    type: custom:button-card
    name: "[[name]]"
    icon: "[[icon]]"
    tap_action:
      action: navigate
      navigation_path: "[[path]]"
    styles:
      card:
        - min-height: 92px
        - border-radius: 16px
        - padding: 16px
        - background: var(--kia-card-gradient, linear-gradient(145deg, rgba(32, 36, 45, 0.98), rgba(17, 21, 28, 0.98)))
        - border: var(--kia-card-border, 1px solid rgba(92, 200, 255, 0.14))
        - box-shadow: var(--kia-card-shadow, 0 16px 38px rgba(0, 0, 0, 0.30))
      icon:
        - width: 32px
        - color: var(--kia-brand-primary, #5cc8ff)
      name:
        - width: 100%
        - margin-top: 10px
        - font-size: 15px
        - font-weight: 700
        - line-height: 1.2
        - white-space: normal
        - overflow: visible
        - text-overflow: unset
        - color: var(--kia-text-primary, #f4f6f8)

kia_visual_action_tile:
  default:
    - action: none
  card:
    type: custom:button-card
    entity: "[[entity]]"
    name: "[[name]]"
    icon: "[[icon]]"
    show_state: false
    tap_action:
      action: "[[action]]"
    styles:
      card:
        - min-height: 94px
        - border-radius: 16px
        - padding: 16px
        - background: var(--kia-card-gradient, linear-gradient(145deg, rgba(32, 36, 45, 0.98), rgba(17, 21, 28, 0.98)))
        - border: var(--kia-card-border, 1px solid rgba(92, 200, 255, 0.14))
        - box-shadow: var(--kia-card-shadow, 0 16px 38px rgba(0, 0, 0, 0.30))
      icon:
        - width: 34px
        - color: "[[color]]"
      name:
        - width: 100%
        - margin-top: 10px
        - font-size: 14px
        - font-weight: 700
        - line-height: 1.25
        - white-space: normal
        - overflow: visible
        - text-overflow: unset
        - color: var(--kia-text-primary, #f4f6f8)

kia_visual_perform_action_tile:
  default:
    - perform_action: button.press
  card:
    type: custom:button-card
    entity: "[[entity]]"
    name: "[[name]]"
    icon: "[[icon]]"
    show_state: false
    tap_action:
      action: perform-action
      perform_action: "[[perform_action]]"
      target:
        entity_id: "[[entity]]"
    styles:
      card:
        - min-height: 94px
        - border-radius: 16px
        - padding: 16px
        - background: var(--kia-card-gradient, linear-gradient(145deg, rgba(32, 36, 45, 0.98), rgba(17, 21, 28, 0.98)))
        - border: var(--kia-card-border, 1px solid rgba(92, 200, 255, 0.14))
        - box-shadow: var(--kia-card-shadow, 0 16px 38px rgba(0, 0, 0, 0.30))
      icon:
        - width: 34px
        - color: "[[color]]"
      name:
        - width: 100%
        - margin-top: 10px
        - font-size: 14px
        - font-weight: 700
        - line-height: 1.25
        - white-space: normal
        - overflow: visible
        - text-overflow: unset
        - color: var(--kia-text-primary, #f4f6f8)

kia_visual_stat_tile:
  card:
    type: custom:button-card
    entity: "[[entity]]"
    name: "[[name]]"
    icon: "[[icon]]"
    show_state: true
    show_label: true
    label: "[[label]]"
    tap_action:
      action: more-info
    styles:
      card:
        - min-height: 116px
        - border-radius: 16px
        - padding: 16px
        - background: var(--kia-card-gradient, linear-gradient(145deg, rgba(32, 36, 45, 0.98), rgba(17, 21, 28, 0.98)))
        - border: var(--kia-card-border, 1px solid rgba(92, 200, 255, 0.14))
        - box-shadow: var(--kia-card-shadow, 0 16px 38px rgba(0, 0, 0, 0.30))
      grid:
        - "grid-template-areas: 'n i' 's i' 'l i'"
        - grid-template-columns: minmax(0, 1fr) 34px
        - grid-template-rows: min-content min-content min-content
        - align-items: center
      icon:
        - justify-self: end
        - width: 26px
        - color: var(--kia-brand-primary, #5cc8ff)
      name:
        - justify-self: start
        - width: 100%
        - font-size: 13px
        - font-weight: 700
        - line-height: 1.15
        - white-space: normal
        - overflow-wrap: normal
        - word-break: keep-all
        - overflow: visible
        - text-overflow: unset
        - color: var(--kia-text-secondary, #b7c0cc)
      state:
        - justify-self: start
        - width: 100%
        - font-size: clamp(22px, 2.2vw, 30px)
        - font-weight: 800
        - line-height: 1.05
        - white-space: normal
        - overflow-wrap: normal
        - word-break: keep-all
        - overflow: visible
        - text-overflow: unset
        - color: var(--kia-text-primary, #f4f6f8)
      label:
        - justify-self: start
        - width: 100%
        - font-size: 12px
        - font-weight: 600
        - line-height: 1.15
        - white-space: normal
        - overflow-wrap: normal
        - word-break: keep-all
        - overflow: visible
        - text-overflow: unset
        - color: var(--kia-text-muted, #8a94a3)

kia_visual_text_panel:
  card:
    type: custom:button-card
    name: "[[title]]"
    show_icon: false
    show_label: false
    show_state: false
    tap_action:
      action: none
    custom_fields:
      body: >-
        [[content]]
    styles:
      card:
        - min-height: 128px
        - align-items: start
        - justify-content: start
        - text-align: left
        - border-radius: 18px
        - padding: 18px
        - background: var(--kia-card-gradient, linear-gradient(145deg, rgba(32, 36, 45, 0.98), rgba(17, 21, 28, 0.98)))
        - border: var(--kia-card-border, 1px solid rgba(92, 200, 255, 0.14))
        - box-shadow: var(--kia-card-shadow, 0 16px 38px rgba(0, 0, 0, 0.28))
      grid:
        - "grid-template-areas: 'n' 'body'"
        - grid-template-columns: 1fr
        - grid-template-rows: min-content 1fr
        - row-gap: 12px
      name:
        - justify-self: start
        - width: 100%
        - color: var(--kia-text-primary, #f4f6f8)
        - font-size: 22px
        - font-weight: 700
        - white-space: normal
        - overflow: visible
        - text-overflow: unset
        - text-align: left
      custom_fields:
        body:
          - justify-self: start
          - width: 100%
          - color: var(--kia-text-secondary, #b7c0cc)
          - font-size: 14px
          - font-weight: 600
          - line-height: 1.45
          - white-space: normal
          - overflow-wrap: normal
          - word-break: keep-all
          - overflow: visible
          - text-overflow: unset
          - text-align: left

kia_back_to_overview:
  card:
    type: custom:button-card
    name: Back to Overview
    icon: mdi:arrow-left
    show_state: false
    tap_action:
      action: navigate
      navigation_path: /lovelace/overview
    styles:
      card:
        - min-height: 128px
        - border-radius: 18px
        - padding: 18px
        - background: var(--kia-card-gradient, linear-gradient(145deg, rgba(32, 36, 45, 0.98), rgba(17, 21, 28, 0.98)))
        - border: var(--kia-card-border, 1px solid rgba(92, 200, 255, 0.14))
        - box-shadow: var(--kia-card-shadow, 0 16px 38px rgba(0, 0, 0, 0.28))
      icon:
        - width: 48px
        - color: var(--kia-brand-primary, #5cc8ff)
      name:
        - width: 100%
        - margin-top: 12px
        - font-size: 15px
        - font-weight: 700
        - line-height: 1.2
        - white-space: normal
        - overflow: visible
        - text-overflow: unset
        - color: var(--kia-text-primary, #f4f6f8)
