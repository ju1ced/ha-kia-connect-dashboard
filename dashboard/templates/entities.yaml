---
# Vehicle-specific Home Assistant entity IDs live here only.
# Dashboard files should reference these logical keys through templates.
vehicle:
  name: "Kia EV6"
  model: "EV6 GT-Line RWD"
  year: 2026

battery:
  level: sensor.oprit_nebula_ev_battery_level
  charging_state: binary_sensor.oprit_nebula_ev_battery_charge
  charging_power: sensor.oprit_nebula_ev_charging_power
  estimated_range: sensor.oprit_nebula_ev_range
  target_charge_limit: number.oprit_nebula_ac_charging_limit
  plug_connected: binary_sensor.oprit_nebula_ev_battery_plug

climate:
  set_temperature: sensor.oprit_nebula_set_temperature
  hvac: climate.oprit_nebula_climate_control
  defrost: binary_sensor.oprit_nebula_defrost
  steering_wheel_heater: binary_sensor.oprit_nebula_steering_wheel_heater

location:
  tracker: device_tracker.oprit_nebula_location
  odometer: sensor.oprit_nebula_odometer

locks:
  door_lock: lock.oprit_nebula_door_lock
  charging_port: binary_sensor.oprit_nebula_ev_charge_port

openings:
  front_left_door: binary_sensor.oprit_nebula_front_left_door
  front_right_door: binary_sensor.oprit_nebula_front_right_door
  rear_left_door: binary_sensor.oprit_nebula_back_left_door
  rear_right_door: binary_sensor.oprit_nebula_back_right_door
  trunk: binary_sensor.oprit_nebula_trunk
  hood: binary_sensor.oprit_nebula_hood
  front_left_window: binary_sensor.oprit_nebula_front_left_window
  front_right_window: binary_sensor.oprit_nebula_front_right_window
  rear_left_window: binary_sensor.oprit_nebula_back_left_window
  rear_right_window: binary_sensor.oprit_nebula_back_right_window

lights:
  headlights: binary_sensor.oprit_nebula_headlamp_status

tires:
  front_left_pressure: binary_sensor.oprit_nebula_tire_pressure_front_left
  front_right_pressure: binary_sensor.oprit_nebula_tire_pressure_front_right
  rear_left_pressure: binary_sensor.oprit_nebula_tire_pressure_rear_left
  rear_right_pressure: binary_sensor.oprit_nebula_tire_pressure_rear_right

controls:
  refresh: button.oprit_nebula_force_refresh
  start_climate: switch.oprit_nebula_climate
  stop_climate: switch.oprit_nebula_climate
  start_charging: switch.oprit_nebula_ev_charging
  stop_charging: switch.oprit_nebula_ev_charging
  last_refresh_result: sensor.oprit_nebula_laatste_scan
  last_climate_result: switch.oprit_nebula_climate
  last_charging_result: switch.oprit_nebula_ev_charging

settings:
  mapping: sensor.oprit_nebula_data
