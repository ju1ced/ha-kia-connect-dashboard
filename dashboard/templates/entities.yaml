---
# Example Home Assistant entity IDs for repository-side YAML rendering only.
# HACS users should configure entities directly on custom:kia-dashboard-card.
vehicle:
  name: "Kia EV6"
  model: "EV6 GT-Line RWD"
  year: 2026

battery:
  level: sensor.kia_ev6_ev_battery_level
  charging_state: binary_sensor.kia_ev6_ev_battery_charge
  charging_power: sensor.kia_ev6_ev_charging_power
  estimated_range: sensor.kia_ev6_ev_range
  target_charge_limit: number.kia_ev6_ac_charging_limit
  plug_connected: binary_sensor.kia_ev6_ev_battery_plug

climate:
  set_temperature: sensor.kia_ev6_set_temperature
  hvac: climate.kia_ev6_climate_control
  defrost: binary_sensor.kia_ev6_defrost
  steering_wheel_heater: binary_sensor.kia_ev6_steering_wheel_heater

location:
  tracker: device_tracker.kia_ev6_location
  odometer: sensor.kia_ev6_odometer

locks:
  door_lock: lock.kia_ev6_door_lock
  charging_port: binary_sensor.kia_ev6_ev_charge_port

openings:
  front_left_door: binary_sensor.kia_ev6_front_left_door
  front_right_door: binary_sensor.kia_ev6_front_right_door
  rear_left_door: binary_sensor.kia_ev6_rear_left_door
  rear_right_door: binary_sensor.kia_ev6_rear_right_door
  trunk: binary_sensor.kia_ev6_trunk
  hood: binary_sensor.kia_ev6_hood
  front_left_window: binary_sensor.kia_ev6_front_left_window
  front_right_window: binary_sensor.kia_ev6_front_right_window
  rear_left_window: binary_sensor.kia_ev6_rear_left_window
  rear_right_window: binary_sensor.kia_ev6_rear_right_window

lights:
  headlights: binary_sensor.kia_ev6_headlamp_status

tires:
  front_left_pressure: binary_sensor.kia_ev6_tire_pressure_front_left
  front_right_pressure: binary_sensor.kia_ev6_tire_pressure_front_right
  rear_left_pressure: binary_sensor.kia_ev6_tire_pressure_rear_left
  rear_right_pressure: binary_sensor.kia_ev6_tire_pressure_rear_right

controls:
  refresh: button.kia_ev6_force_refresh
  start_climate: switch.kia_ev6_climate
  stop_climate: switch.kia_ev6_climate
  start_charging: switch.kia_ev6_ev_charging
  stop_charging: switch.kia_ev6_ev_charging
  last_refresh_result: sensor.kia_ev6_last_refresh
  last_climate_result: switch.kia_ev6_climate
  last_charging_result: switch.kia_ev6_ev_charging

settings:
  mapping: sensor.kia_ev6_data
