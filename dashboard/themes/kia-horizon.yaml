      kia-status-locked: "#7ee787"
      kia-status-unlocked: "#ffd166"

      kia-battery-high: "#7ee787"
      kia-battery-medium: "#ffd166"
      kia-battery-low: "#ff9f43"
      kia-battery-critical: "#ff6b6b"

      kia-card-gradient: "linear-gradient(145deg, rgba(32, 36, 45, 0.98), rgba(17, 21, 28, 0.98))"
      kia-card-border: "1px solid rgba(92, 200, 255, 0.14)"
      kia-card-shadow: "0 16px 38px rgba(0, 0, 0, 0.30)"
      kia-hero-gradient: "linear-gradient(145deg, rgba(17, 21, 28, 0.98), rgba(32, 36, 45, 0.94))"
      kia-hero-vehicle-color: "rgba(244, 246, 248, 0.78)"

      kia-shadow-soft: "0 12px 30px rgba(0, 0, 0, 0.24)"
      kia-shadow-raised: "0 18px 44px rgba(0, 0, 0, 0.32)"
