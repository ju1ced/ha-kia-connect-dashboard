---
Kia Horizon:
  # Core Home Assistant surfaces. These dark defaults keep older HA installs
  # readable even before Home Assistant applies the mode-specific values below.
  primary-background-color: "#0f1115"
  secondary-background-color: "#171a21"
  card-background-color: "#20242d"
  divider-color: "#343a46"

  # Text
  primary-text-color: "#f4f6f8"
  secondary-text-color: "#b7c0cc"
  disabled-text-color: "#6f7885"

  # Brand and interaction
  primary-color: "#5cc8ff"
  accent-color: "#7ee787"
  ha-card-border-radius: "18px"
  ha-card-box-shadow: "0 18px 44px rgba(0, 0, 0, 0.32)"

  # Semantic Kia dashboard tokens
  kia-surface-base: "#0f1115"
  kia-surface-raised: "#20242d"
  kia-surface-elevated: "#2b303a"
  kia-surface-overlay: "rgba(15, 17, 21, 0.88)"
  kia-border-subtle: "#343a46"

  kia-text-primary: "#f4f6f8"
  kia-text-secondary: "#b7c0cc"
  kia-text-muted: "#8a94a3"
  kia-text-inverse: "#081018"

  kia-brand-primary: "#5cc8ff"
  kia-brand-secondary: "#7ee787"
  kia-brand-accent: "#ffd166"

  kia-status-charging: "#7ee787"
  kia-status-ready: "#5cc8ff"
  kia-status-warning: "#ffd166"
  kia-status-critical: "#ff6b6b"
  kia-status-offline: "#8a94a3"
  kia-status-locked: "#7ee787"
  kia-status-unlocked: "#ffd166"

  kia-battery-high: "#7ee787"
  kia-battery-medium: "#ffd166"
  kia-battery-low: "#ff9f43"
  kia-battery-critical: "#ff6b6b"

  kia-card-gradient: "linear-gradient(145deg, rgba(32, 36, 45, 0.98), rgba(17, 21, 28, 0.98))"
  kia-card-border: "1px solid rgba(92, 200, 255, 0.14)"
  kia-card-shadow: "0 16px 38px rgba(0, 0, 0, 0.30)"
  kia-hero-gradient: "linear-gradient(145deg, rgba(17, 21, 28, 0.98), rgba(32, 36, 45, 0.94))"
  kia-hero-vehicle-color: "rgba(244, 246, 248, 0.78)"

  kia-radius-small: "10px"
  kia-radius-medium: "16px"
  kia-radius-large: "24px"
  kia-spacing-xs: "4px"
  kia-spacing-sm: "8px"
  kia-spacing-md: "16px"
  kia-spacing-lg: "24px"
  kia-spacing-xl: "32px"

  kia-shadow-soft: "0 12px 30px rgba(0, 0, 0, 0.24)"
  kia-shadow-raised: "0 18px 44px rgba(0, 0, 0, 0.32)"

  modes:
    light:
      primary-background-color: "#f5f7fb"
      secondary-background-color: "#eef2f7"
      card-background-color: "#ffffff"
      divider-color: "#d7dee8"

      primary-text-color: "#101820"
      secondary-text-color: "#4c5968"
      disabled-text-color: "#7a8491"

      primary-color: "#0077b6"
      accent-color: "#188038"
      ha-card-box-shadow: "0 14px 32px rgba(15, 23, 42, 0.14)"

      kia-surface-base: "#f5f7fb"
      kia-surface-raised: "#ffffff"
      kia-surface-elevated: "#eef2f7"
      kia-surface-overlay: "rgba(255, 255, 255, 0.92)"
      kia-border-subtle: "#d7dee8"

      kia-text-primary: "#101820"
      kia-text-secondary: "#4c5968"
      kia-text-muted: "#6d7785"
      kia-text-inverse: "#f8fbff"

      kia-brand-primary: "#0077b6"
      kia-brand-secondary: "#188038"
      kia-brand-accent: "#b7791f"

      kia-status-charging: "#188038"
      kia-status-ready: "#0077b6"
      kia-status-warning: "#b7791f"
      kia-status-critical: "#c2413b"
      kia-status-offline: "#6d7785"
      kia-status-locked: "#188038"
      kia-status-unlocked: "#b7791f"

      kia-battery-high: "#188038"
      kia-battery-medium: "#b7791f"
      kia-battery-low: "#c56a18"
      kia-battery-critical: "#c2413b"

      kia-card-gradient: "linear-gradient(145deg, rgba(255, 255, 255, 0.98), rgba(239, 244, 250, 0.98))"
      kia-card-border: "1px solid rgba(0, 119, 182, 0.18)"
      kia-card-shadow: "0 14px 32px rgba(15, 23, 42, 0.14)"
      kia-hero-gradient: "linear-gradient(145deg, rgba(255, 255, 255, 0.98), rgba(231, 238, 247, 0.96))"
      kia-hero-vehicle-color: "rgba(0, 119, 182, 0.18)"

      kia-shadow-soft: "0 10px 24px rgba(15, 23, 42, 0.10)"
      kia-shadow-raised: "0 14px 32px rgba(15, 23, 42, 0.14)"

    dark:
      primary-background-color: "#0f1115"
      secondary-background-color: "#171a21"
