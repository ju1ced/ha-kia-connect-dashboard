name: CI

"on":
  pull_request:
  push:
    branches: [main]

jobs:
  qa-agent:
    name: QA Agent
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install Python validators
        run: python -m pip install yamllint
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate required structure
        run: python scripts/check_required_structure.py
      - name: Lint YAML
        run: yamllint .
      - name: Install Node validators
        run: npm install
      - name: Lint Markdown
        run: npm run markdown:lint
      - name: Check formatting
        run: npm run format:check
      - name: Check direct entity references
        run: python scripts/check_entity_references.py
      - name: Check image references
        run: python scripts/check_image_references.py
