<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Home Assistant navigation flow reference</title>
  <desc id="desc">Reference flow from an existing Home Assistant dashboard into the Kia Overview page and detail pages.</desc>
  <rect width="1440" height="900" fill="#f5f7fb"/>
  <text x="90" y="90" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">Dashboard entry and internal navigation</text>
  <text x="90" y="126" font-family="Arial, sans-serif" font-size="18" fill="#64748b">Designed to sit behind a Kia EV6 button in an existing Home Assistant dashboard.</text>

  <rect x="90" y="210" width="320" height="180" rx="26" fill="#ffffff" stroke="#d8dee9"/>
  <text x="130" y="270" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Home dashboard</text>
  <rect x="130" y="310" width="190" height="54" rx="16" fill="#0b5cab"/>
  <text x="166" y="344" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">KIA EV6</text>

  <path d="M420 300 H566" stroke="#94a3b8" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <rect x="584" y="184" width="340" height="232" rx="28" fill="#101828"/>
  <text x="626" y="250" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Kia Overview</text>
  <text x="626" y="286" font-family="Arial, sans-serif" font-size="17" fill="#cbd5e1">The hub for every Kia-specific section.</text>
  <rect x="626" y="324" width="110" height="44" rx="12" fill="#eef6ff"/>
  <text x="652" y="352" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Battery</text>
  <rect x="752" y="324" width="110" height="44" rx="12" fill="#eef6ff"/>
  <text x="780" y="352" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Vehicle</text>

  <path d="M934 300 H1080" stroke="#94a3b8" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <g font-family="Arial, sans-serif">
    <rect x="1098" y="118" width="250" height="82" rx="18" fill="#ffffff" stroke="#d8dee9"/>
    <text x="1160" y="168" font-size="18" font-weight="700" fill="#111827">Battery</text>
    <rect x="1098" y="224" width="250" height="82" rx="18" fill="#ffffff" stroke="#d8dee9"/>
    <text x="1162" y="274" font-size="18" font-weight="700" fill="#111827">Vehicle</text>
    <rect x="1098" y="330" width="250" height="82" rx="18" fill="#ffffff" stroke="#d8dee9"/>
    <text x="1160" y="380" font-size="18" font-weight="700" fill="#111827">Climate</text>
    <rect x="1098" y="436" width="250" height="82" rx="18" fill="#ffffff" stroke="#d8dee9"/>
    <text x="1164" y="486" font-size="18" font-weight="700" fill="#111827">Energy</text>
    <rect x="1098" y="542" width="250" height="82" rx="18" fill="#ffffff" stroke="#d8dee9"/>
    <text x="1157" y="592" font-size="18" font-weight="700" fill="#111827">Location</text>
    <rect x="1098" y="648" width="250" height="82" rx="18" fill="#ffffff" stroke="#d8dee9"/>
    <text x="1158" y="698" font-size="18" font-weight="700" fill="#111827">Settings</text>
  </g>

  <path d="M1098 760 C900 842 676 842 506 430" stroke="#cbd5e1" stroke-width="4" fill="none" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <text x="594" y="816" font-family="Arial, sans-serif" font-size="18" fill="#64748b">Every detail page keeps a standard Back to Overview action.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
